# ============================================================
# Cloudflare Worker configuration for BOTC Homebrew Wiki
# This file tells Cloudflare how to wire the Worker to:
#   - the static site files (your HTML/CSS/JS/images)
#   - the D1 database (botc-wiki)
#   - the KV namespace for login sessions
# ============================================================

name = "botc-homebrew-wiki"
main = "worker/worker.js"
compatibility_date = "2026-06-15"

# ---- Static assets ----
# Serves all your HTML/CSS/images. The Worker runs FIRST so it can
# intercept /characters.json, /collections.json, /scripts.json and /api/*,
# then falls through to static files for everything else.
[assets]
directory = "."
binding = "ASSETS"
run_worker_first = ["/characters.json", "/collections.json", "/scripts.json", "/api/*"]

# ---- D1 database (the source of truth) ----
[[d1_databases]]
binding = "DB"
database_name = "botc-wiki"
# database_id is filled in during deploy (Cloudflare provides it)
database_id = "1f49bdfc-cb4a-4a24-acbf-361a16612816"

# ---- KV namespace (login sessions) ----
[[kv_namespaces]]
binding = "SESSIONS"
# id is filled in during deploy
id = "1216080cee4546068ebe742c95315e0b"
