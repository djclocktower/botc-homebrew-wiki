# ============================================================
# Cloudflare Worker configuration for BOTC Homebrew Wiki
# This file tells Cloudflare how to wire the Worker to:
#   - the static site files (your HTML/CSS/JS/images)
#   - the D1 database (botc-wiki)
#   - the KV namespace for login sessions
# ============================================================

name = "botc-homebrew-wiki"
main = "worker/worker.js"
compatibility_date = "2026-06-15"

# NOTE on env vars (DISCORD_CLIENT_ID, RESEND_API_KEY, ...): set them in the
# Cloudflare dashboard as type "Secret", NEVER type "Text". Git deploys wipe
# dashboard "Text" variables (that's how Discord login silently broke once);
# "Secret" variables always survive. (`keep_vars = true` would protect Text
# vars too, but Workers Builds rejects that key — do not re-add it here.)

# ---- Static assets ----
# Serves all your HTML/CSS/images. The Worker runs FIRST so it can
# intercept /characters.json, /collections.json, /scripts.json and /api/*,
# then falls through to static files for everything else.
[assets]
directory = "."
binding = "ASSETS"
run_worker_first = [
  "/characters.json", "/collections.json", "/scripts.json", "/api/*",
  "/c/*", "/s/*", "/collection/*", "/u/*", "/random", "/sitemap.xml", "/script-view.html", "/script-view",
  "/assets/art/*", "/assets/collections/*", "/assets/scripts/*", "/assets/tokens/*",
  "/assets/avatars/*"
]

# ---- D1 database (the source of truth) ----
[[d1_databases]]
binding = "DB"
database_name = "botc-wiki"
# database_id is filled in during deploy (Cloudflare provides it)
database_id = "1f49bdfc-cb4a-4a24-acbf-361a16612816"

# ---- KV namespace (login sessions) ----
[[kv_namespaces]]
binding = "SESSIONS"
# id is filled in during deploy
id = "1216080cee4546068ebe742c95315e0b"

# ---- R2 bucket (art & header image uploads) ----
[[r2_buckets]]
binding = "ART"
bucket_name = "botc-wiki-art"

# ---- Nightly backup cron ----
# Runs the Worker's scheduled() handler: dumps every D1 table to JSON in the
# R2 bucket under backups/{YYYY-MM-DD}/ and prunes snapshots older than 30 days.
# 06:00 UTC daily.
[triggers]
crons = ["0 6 * * *"]
