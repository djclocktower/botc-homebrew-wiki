  <div class="home-hero">
    <h1 id="hero-title">Homebrew Scripts</h1>
    <p id="hero-subtitle">Complete custom scripts assembled from wiki characters.</p>
    <a class="create-btn" href="script.html">+ Create a Script</a>
  </div>

  <main class="home-panel">
    <section class="landing-section">
      <div class="collections-grid" id="scripts-grid">
        <p style="grid-column:1/-1;text-align:center;color:rgba(236,225,200,.6);padding:24px">Loading scripts…</p>
      </div>
    </section>
  </main>

  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script>
  (function(){
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    var grid = document.getElementById('scripts-grid');
    fetch('scripts.json?_=' + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(scripts){
        if (!scripts.length){
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:rgba(236,225,200,.6);padding:24px">No scripts yet. <a href="script.html" style="color:#7fb2e6">Create the first one →</a></p>';
          return;
        }
        grid.innerHTML = scripts.map(function(sc){
          var n = (sc.characters || []).length;
          var href = 'script-view.html?s=' + encodeURIComponent(sc.slug);
          var headerHTML = sc.header
            ? '<div class="script-card-header"><img src="assets/' + esc(sc.header) + '" alt="' + esc(sc.name) + '"></div>'
            : '<div class="script-card-header script-card-header-empty"><span>' + esc(sc.name) + '</span></div>';
          return '<a class="collection-tile script-tile" href="' + esc(href) + '">' +
            headerHTML +
            '<h3 class="collection-name">' + esc(sc.name) + '</h3>' +
            (sc.description ? '<p class="script-tile-desc">' + esc(sc.description) + '</p>' : '') +
            '<div class="collection-footer">' +
              '<span class="collection-count">' + n + ' character' + (n===1?'':'s') + (sc.author ? ' · ' + esc(sc.author) : '') + '</span>' +
              '<span class="collection-arrow">View →</span>' +
            '</div></a>';
        }).join('');
      })
      .catch(function(){
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#e6a;padding:30px">Could not load scripts.</p>';
      });
  })();
  </script>
  <script src="assets/site.js"></script>
</body>
</html>
