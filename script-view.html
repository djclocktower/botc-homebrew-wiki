  <div class="search-wrap" id="search-wrap">
    <input class="search-input" id="search-input" type="search" placeholder="Search characters…" autocomplete="off" aria-label="Search characters" aria-expanded="false" aria-haspopup="listbox">
    <div class="search-drop" id="search-drop" role="listbox" aria-label="Search results" hidden></div>

  <main class="wrap" id="content">
    <div class="char-skeleton" aria-hidden="true">
      <div class="skel skel-title"></div>
      <div class="skel skel-block" style="height:160px;margin-bottom:20px"></div>
      <div class="skel skel-block" style="height:300px"></div>
    </div>
  </main>

  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script src="assets/render.js"></script>
  <script>
  (function(){
    var TEAMS = [
      ['townsfolk','Townsfolk'], ['outsider','Outsider'], ['minion','Minion'],
      ['demon','Demon'], ['traveller','Traveller'], ['fabled','Fabled']
    ];
    var GOOD = { townsfolk:1, outsider:1 };
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    var slug = new URLSearchParams(location.search).get('s');
    var content = document.getElementById('content');

    Promise.all([
      fetch('scripts.json?_=' + Date.now()).then(function(r){return r.json();}),
      fetch('characters.json?_=' + Date.now()).then(function(r){return r.json();})
    ]).then(function(res){
      var scripts = res[0], chars = res[1];
      var bySlug = {}; chars.forEach(function(c){ bySlug[c.slug] = c; });
      var sc = scripts.filter(function(s){ return s.slug === slug; })[0];
      if (!sc){
        content.innerHTML = '<p style="color:rgba(236,225,200,.8);text-align:center;padding:40px">Script not found. <a href="scripts.html" style="color:#7fb2e6">Back to all scripts</a>.</p>';
        return;
      }
      document.title = sc.name + ' — BOTC HomeBrew Wiki';
      var cr = document.getElementById('crumb');
      if (cr) cr.innerHTML = '<a href="index.html">Home</a><span class="sep">›</span><a href="scripts.html">Scripts</a><span class="sep">›</span><span class="here">' + esc(sc.name) + '</span>';
      var eb = document.getElementById('edit-btn');
      if (eb){ eb.href = 'script.html?s=' + encodeURIComponent(sc.slug); eb.style.display = ''; }

      // Resolve characters
      var entries = (sc.characters || []).map(function(cs){ return bySlug[cs]; }).filter(Boolean);
      var missing = (sc.characters || []).filter(function(cs){ return !bySlug[cs]; });

      // Build JSON (official script format with _meta)
      var meta = { id: '_meta', name: sc.name || 'Homebrew Script' };
      if (sc.author) meta.author = sc.author;
      if (sc.header) meta.logo = 'https://botchomebrew.wiki/assets/' + sc.header;
      var arr = [meta];
      entries.forEach(function(c){ if (window.buildSchema) arr.push(window.buildSchema(c)); });
      var jsonText = JSON.stringify(arr, null, 2);

      // Header graphic
      var headerHTML = sc.header
        ? '<div class="script-header-wrap"><img class="script-header-img" src="assets/' + esc(sc.header) + '" alt="' + esc(sc.name) + '"></div>'
        : '<h1 class="gen-title">' + esc(sc.name) + '</h1>';

      // Character list grouped by team
      var listHTML = '';
      if (!entries.length){
        listHTML = '<p style="color:var(--ink);opacity:.7;padding:8px 0">No characters on this script yet.</p>';
      } else {
        TEAMS.forEach(function(t){
          var grp = entries.filter(function(c){ return c.team === t[0]; });
          if (!grp.length) return;
          listHTML += '<div class="script-team-group"><h3 class="script-team-head' + (GOOD[t[0]]?' good':'') + '">' + t[1] + ' <span class="script-team-count">(' + grp.length + ')</span></h3>';
          listHTML += '<div class="script-char-list">';
          grp.forEach(function(c){
            listHTML += '<a class="script-char-row" href="' + esc(c.page) + '">' +
              '<img class="script-char-thumb" src="assets/' + esc(c.art) + '" alt="" onerror="this.src=\'assets/favicon.png\'">' +
              '<div class="script-char-text"><span class="script-char-name">' + esc(c.name) + '</span>' +
              '<span class="script-char-ability">' + esc(c.ability || '') + '</span></div></a>';
          });
          listHTML += '</div></div>';
        });
      }
      if (missing.length){
        listHTML += '<p class="script-missing">⚠ ' + missing.length + ' character' + (missing.length===1?'':'s') + ' on this script ' + (missing.length===1?'is':'are') + " not in the wiki: " + missing.map(esc).join(', ') + '</p>';
      }

      var countLine = entries.length + ' character' + (entries.length===1?'':'s');
      if (sc.author) countLine += ' · by ' + esc(sc.author);

      content.innerHTML =
        headerHTML +
        (sc.description ? '<p class="script-desc">' + esc(sc.description) + '</p>' : '') +
        '<p class="script-meta-line">' + countLine + '</p>' +
        '<div class="script-view-layout">' +
          '<section class="script-chars-panel">' + listHTML + '</section>' +
          '<aside class="script-json-panel">' +
            '<div class="json-box open">' +
              '<div class="json-bar">' +
                '<span class="json-bar-toggle" role="button" tabindex="0" aria-expanded="true">Script JSON <span class="json-arrow">&#9662;</span></span>' +
                '<button type="button" class="json-copy">Copy JSON</button>' +
              '</div>' +
              '<pre class="json-body"><code>' + esc(jsonText) + '</code></pre>' +
            '</div>' +
            '<a class="cta-secondary" style="display:block;text-align:center;margin-top:14px" href="script.html">Open in Script Builder</a>' +
            '<a class="cta-secondary" style="display:block;text-align:center;margin-top:10px" href="tokens.html?script=' + encodeURIComponent(sc.slug) + '">Print Tokens</a>' +
          '</aside>' +
        '</div>';
    }).catch(function(err){
      console.error(err);
      content.innerHTML = '<p style="color:#e6a">Could not load script data.</p>';
    });
  })();
  </script>
  <script src="assets/site.js"></script>
</body>
</html>
