<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOTC HomeBrew Wiki</title>
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-skull" src="assets/logo_skull.png" alt="">
      <span class="brand-text"><b>BOTC</b><br>HomeBrew Wiki</span>
      <img class="topbar-badge" src="assets/ccc-parchment.png" alt="Community Created Content">
    </a>
    <nav class="crumb" aria-label="Breadcrumb">
      <span class="here">All Characters</span>
    </nav>
  <div class="search-wrap" id="search-wrap">
    <input class="search-input" id="search-input" type="search" placeholder="Search characters…" autocomplete="off" aria-label="Search characters" aria-expanded="false" aria-haspopup="listbox">
    <div class="search-drop" id="search-drop" role="listbox" aria-label="Search results" hidden></div>
  </div>
  </header>

  <div class="home-hero">
    <h1>HomeBrew Characters</h1>
    <p>Fan-made additions for Blood on the Clocktower</p>
    <a class="create-btn" href="create.html">+ Create a Character</a>
  </div>

  <main class="home-panel" id="panel">
    <p style="text-align:center;color:rgba(236,225,200,.7);padding:30px">Loading characters…</p>
  </main>

  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script>
    var TEAMS = [
      ['townsfolk', 'Townsfolk'], ['outsider', 'Outsider'],
      ['minion', 'Minion'], ['demon', 'Demon'],
      ['traveller', 'Traveller'], ['fabled', 'Fabled']
    ];
    var GOOD = { townsfolk: 1, outsider: 1 };

    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;')
        .replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function card(c) {
      var typeClass = GOOD[c.team] ? ' good' : '';
      return '<a class="char-card" href="' + esc(c.page) + '">' +
        '<img class="char-card-thumb" src="assets/' + esc(c.art) + '" alt="' + esc(c.name) + ' art">' +
        '<div class="char-card-info">' +
        '<div class="char-card-name">' + esc(c.name) + '</div>' +
        '<div class="char-card-type' + typeClass + '">' + esc((window.TEAM_LABEL && window.TEAM_LABEL[c.team]) || c.team) + '</div>' +
        '<div class="char-card-ability">' + esc(c.ability || '') + '</div>' +
        '<span class="char-card-link">View Character →</span>' +
        '</div></a>';
    }

    fetch('characters.json?_=' + Date.now())
      .then(function (r) { return r.json(); })
      .then(function (list) {
        window.TEAM_LABEL = window.TEAM_LABEL || {
          townsfolk: 'Townsfolk', outsider: 'Outsider', minion: 'Minion',
          demon: 'Demon', traveller: 'Traveller', fabled: 'Fabled'
        };
        var panel = document.getElementById('panel');
        var html = '';
        TEAMS.forEach(function (t) {
          var key = t[0], label = t[1];
          var chars = list.filter(function (c) { return c.team === key; });
          // always show the 4 core teams; only show traveller/fabled if populated
          if (!chars.length && (key === 'traveller' || key === 'fabled')) return;
          html += '<section class="type-section" id="' + key + '">' +
            '<h2 class="type-header"><a href="team.html?t=' + key + '" class="team-header-link">' + label + '</a></h2><div class="type-rule"></div>' +
            '<div class="char-grid">';
          html += chars.map(card).join('');
          html += '<a class="char-card empty-card" href="create.html" style="display:flex;align-items:center;justify-content:center;text-decoration:none">+ Add a ' + label + '</a>';
          html += '</div></section>';
        });
        panel.innerHTML = html;
      })
      .catch(function () {
        document.getElementById('panel').innerHTML =
          '<p style="text-align:center;color:#e6a;padding:30px">Could not load character list.</p>';
      });
  </script>
<script>
  (function () {
    // asset prefix differs for pages in characters/ subfolder
    var ROOT = (function () {
      var s = document.querySelector('link[rel="stylesheet"]');
      if (!s) return '';
      var href = s.getAttribute('href');
      return href.replace('assets/styles.css', '');
    })();

    var input = document.getElementById('search-input');
    var drop  = document.getElementById('search-drop');
    if (!input || !drop) return;

    var allChars = null;
    var fetchPromise = null;

    function ensureData() {
      if (allChars) return Promise.resolve(allChars);
      if (fetchPromise) return fetchPromise;
      fetchPromise = fetch(ROOT + 'characters.json?_=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (list) { allChars = list; return list; });
      return fetchPromise;
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var GOOD = { townsfolk: 1, outsider: 1 };
    var TEAM_LABEL = {
      townsfolk:'Townsfolk', outsider:'Outsider', minion:'Minion',
      demon:'Demon', traveller:'Traveller', fabled:'Fabled'
    };

    function search(q) {
      q = q.trim().toLowerCase();
      if (!q || !allChars) return [];
      return allChars.filter(function (c) {
        var haystack = [
          c.name || '',
          c.ability || '',
          c.tags || '',
          c.lede || '',
          c.team || ''
        ].join(' ').toLowerCase();
        return haystack.indexOf(q) !== -1;
      }).slice(0, 8);
    }

    function render(results, q) {
      if (!results.length) {
        drop.innerHTML = '<div class="search-empty">No characters found for \u201c' + esc(q) + '\u201d</div>';
        return;
      }
      drop.innerHTML = results.map(function (c) {
        var typeClass = GOOD[c.team] ? ' good' : '';
        var ability = c.ability || '';
        if (ability.length > 80) ability = ability.slice(0, 80) + '…';
        return '<a class="search-result" href="' + esc(ROOT + c.page) + '" role="option">' +
          '<img class="search-result-thumb" src="' + esc(ROOT + 'assets/' + c.art) + '" alt="">' +
          '<div class="search-result-info">' +
          '<span class="search-result-name">' + esc(c.name) + '</span>' +
          '<span class="search-result-type' + typeClass + '">' + esc(TEAM_LABEL[c.team] || c.team) + '</span>' +
          '<span class="search-result-ability">' + esc(ability) + '</span>' +
          '</div></a>';
      }).join('');
    }

    function open() {
      drop.hidden = false;
      input.setAttribute('aria-expanded', 'true');
    }
    function close() {
      drop.hidden = true;
      input.setAttribute('aria-expanded', 'false');
    }

    var debTimer;
    input.addEventListener('input', function () {
      clearTimeout(debTimer);
      var q = input.value.trim();
      if (!q) { close(); return; }
      debTimer = setTimeout(function () {
        ensureData().then(function () {
          var results = search(q);
          render(results, q);
          open();
        });
      }, 150);
    });

    input.addEventListener('focus', function () {
      if (input.value.trim() && allChars) open();
    });

    // Keyboard navigation
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { close(); input.blur(); return; }
      if (e.key === 'ArrowDown') {
        var first = drop.querySelector('.search-result');
        if (first) { e.preventDefault(); first.focus(); }
        return;
      }
    });
    drop.addEventListener('keydown', function (e) {
      var cur = document.activeElement;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        var next = cur.nextElementSibling;
        if (next) next.focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        var prev = cur.previousElementSibling;
        if (prev) prev.focus(); else input.focus();
      } else if (e.key === 'Escape') {
        close(); input.focus();
      }
    });

    // Close on outside click
    document.addEventListener('click', function (e) {
      if (!document.getElementById('search-wrap').contains(e.target)) close();
    });

    // Prefetch on hover so results feel instant
    document.getElementById('search-wrap').addEventListener('mouseenter', ensureData);
  })();
</script>

</body>
</html>
