<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOTC HomeBrew Wiki</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-skull" src="assets/logo_skull.png" alt="">
      <span class="brand-text"><b>BOTC</b><br>HomeBrew Wiki</span>
    </a>
    <nav class="crumb" aria-label="Breadcrumb">
      <span class="here">All Characters</span>
    </nav>
  </header>

  <div class="home-hero">
    <h1>HomeBrew Characters</h1>
    <p>Fan-made additions for Blood on the Clocktower</p>
    <a class="create-btn" href="create.html">+ Create a Character</a>
  </div>

  <main class="home-panel" id="panel">
    <p style="text-align:center;color:rgba(236,225,200,.7);padding:30px">Loading characters…</p>
  </main>

  <div class="ccc-bar"><img src="assets/ccc-parchment.png" alt="Community Created Content"></div>
  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script>
    var TEAMS = [
      ['townsfolk', 'Townsfolk'], ['outsider', 'Outsider'],
      ['minion', 'Minion'], ['demon', 'Demon'],
      ['traveller', 'Traveller'], ['fabled', 'Fabled']
    ];
    var GOOD = { townsfolk: 1, outsider: 1 };

    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;')
        .replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function card(c) {
      var typeClass = GOOD[c.team] ? ' good' : '';
      return '<a class="char-card" href="' + esc(c.page) + '">' +
        '<img class="char-card-thumb" src="assets/' + esc(c.art) + '" alt="' + esc(c.name) + ' art">' +
        '<div class="char-card-info">' +
        '<div class="char-card-name">' + esc(c.name) + '</div>' +
        '<div class="char-card-type' + typeClass + '">' + esc((window.TEAM_LABEL && window.TEAM_LABEL[c.team]) || c.team) + '</div>' +
        '<div class="char-card-ability">' + esc(c.ability || '') + '</div>' +
        '<span class="char-card-link">View Character →</span>' +
        '</div></a>';
    }

    fetch('characters.json?_=' + Date.now())
      .then(function (r) { return r.json(); })
      .then(function (list) {
        window.TEAM_LABEL = window.TEAM_LABEL || {
          townsfolk: 'Townsfolk', outsider: 'Outsider', minion: 'Minion',
          demon: 'Demon', traveller: 'Traveller', fabled: 'Fabled'
        };
        var panel = document.getElementById('panel');
        var html = '';
        TEAMS.forEach(function (t) {
          var key = t[0], label = t[1];
          var chars = list.filter(function (c) { return c.team === key; });
          // always show the 4 core teams; only show traveller/fabled if populated
          if (!chars.length && (key === 'traveller' || key === 'fabled')) return;
          html += '<section class="type-section" id="' + key + '">' +
            '<h2 class="type-header">' + label + '</h2><div class="type-rule"></div>' +
            '<div class="char-grid">';
          html += chars.map(card).join('');
          html += '<a class="char-card empty-card" href="create.html" style="display:flex;align-items:center;justify-content:center;text-decoration:none">+ Add a ' + label + '</a>';
          html += '</div></section>';
        });
        panel.innerHTML = html;
      })
      .catch(function () {
        document.getElementById('panel').innerHTML =
          '<p style="text-align:center;color:#e6a;padding:30px">Could not load character list.</p>';
      });
  </script>
</body>
</html>
