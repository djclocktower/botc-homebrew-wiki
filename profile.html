<!DOCTYPE html>
<html lang="en" class="redesign-on">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Profile — BOTC HomeBrew Wiki</title>
<meta name="description" content="A creator profile on the BOTC HomeBrew Wiki — their published characters, scripts, and collections for Blood on the Clocktower.">
<!-- Served at /u/{username}, so every path on this page is absolute. -->
<link rel="icon" type="image/png" sizes="64x64" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/favicon.png">
<link rel="stylesheet" href="/assets/styles.css">
<link rel="stylesheet" href="/assets/header-redesign.css">
<style>
  .profile-hero { display:flex; align-items:center; gap:22px; flex-wrap:wrap; justify-content:center; text-align:left; }
  .profile-avatar {
    width:86px; height:86px; border-radius:50%; flex-shrink:0;
    background:var(--maroon, #5b1f21); color:#f7ecd0; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-family:'Dumbledor2',serif; font-size:2.2rem;
    border:2px solid rgba(236,225,200,.4);
  }
  .profile-avatar img { width:100%; height:100%; object-fit:cover; }
  .profile-hero-text h1 { margin:0 0 2px; }
  .profile-uname { font-size:.95rem; color:rgba(236,225,200,.75); margin:0 0 6px; }
  .profile-bio { font-size:.95rem; color:rgba(236,225,200,.9); max-width:60ch; margin:0 0 6px; }
  .profile-joined { font-size:.82rem; color:rgba(236,225,200,.6); margin:0; }
  .profile-empty { text-align:center; color:rgba(236,225,200,.7); padding:30px; }
  .profile-msg-btn {
    display:inline-block; margin-top:10px; padding:7px 16px;
    font-family:'TradeGothicLT','Libre Franklin',sans-serif; font-weight:700; font-size:.88rem;
    color:#f4ead2; background:linear-gradient(180deg,#7a2d2f,#5b1f21);
    border:1px solid rgba(236,225,200,.35); border-radius:6px; text-decoration:none;
  }
  .profile-msg-btn:hover { background:linear-gradient(180deg,#8a3537,#6b2527); }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand-group">
      <a class="brand" href="/">
        <img class="brand-skull" src="/assets/logo_skull.png" alt="">
        <img class="brand-header-text" src="/assets/headertext.png" alt="BOTC HomeBrew Wiki">
      </a>
      <img class="topbar-badge" src="/assets/ccc-parchment.png" alt="Community Created Content">
    </div>
    <nav class="crumb" aria-label="Primary">
      <a href="/all-characters">All Characters</a>
      <a href="/scripts">Scripts</a>
      <a href="/tags">Tags</a>
      <a href="/creators">Creators</a>
      <a href="/script">Script Builder</a>
    </nav>
    <div class="search-wrap" id="search-wrap">
      <input class="search-input" id="search-input" type="search" placeholder="Search characters…" autocomplete="off" aria-label="Search characters" aria-expanded="false" aria-haspopup="listbox">
      <div class="search-drop" id="search-drop" role="listbox" aria-label="Search results" hidden></div>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Navigation menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>
  <nav class="nav-dropdown" id="nav-dropdown" aria-label="Mobile navigation">
    <div class="nav-dropdown-search">
      <input type="search" id="nav-search-input" placeholder="Search characters…" autocomplete="off">
    </div>
    <a href="/">Home</a>
    <a href="/all-characters">All Characters</a>
    <a href="/scripts">Scripts</a>
    <a href="/tags">Tags</a>
    <a href="/creators">Creators</a>
    <a href="/script">Script Builder</a>
  </nav>

  <div class="home-hero">
    <div class="profile-hero" id="profile-hero">
      <h1 id="hero-loading">Loading profile…</h1>
    </div>
  </div>

  <main class="home-panel" id="panel"></main>

  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script>
  (function () {
    var GOOD = { townsfolk: 1, outsider: 1 };
    var TEAM_LABEL = {
      townsfolk: 'Townsfolk', outsider: 'Outsider', minion: 'Minion',
      demon: 'Demon', traveller: 'Traveller', fabled: 'Fabled'
    };
    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;')
        .replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmtDate(d) {
      if (!d) return '';
      var t = new Date(String(d).replace(' ', 'T') + (String(d).indexOf('Z') === -1 ? 'Z' : ''));
      if (isNaN(t)) return String(d).slice(0, 10);
      return t.toLocaleDateString(undefined, { year: 'numeric', month: 'long' });
    }

    // Username from /u/{name}, with ?u= as a fallback (direct profile.html visits)
    var m = location.pathname.match(/^\/u\/([^\/]+)\/?$/);
    var username = m ? decodeURIComponent(m[1]) : (new URLSearchParams(location.search).get('u') || '');

    var hero = document.getElementById('profile-hero');
    var panel = document.getElementById('panel');

    function fail(msg) {
      hero.innerHTML = '<h1>Creator not found</h1>';
      panel.innerHTML = '<p class="profile-empty">' + esc(msg) + ' <a href="/creators.html" style="color:#7fb2e6">Browse all creators</a>.</p>';
    }

    if (!username) { fail('No creator specified.'); return; }

    function charCard(c) {
      var typeClass = GOOD[c.team] ? ' good' : '';
      return '<a class="char-card" href="/' + esc(c.page || ('c/' + c.slug + '.html')) + '">' +
        '<img loading="lazy" decoding="async" class="char-card-thumb" src="/assets/' + esc(c.art) + '" alt="' + esc(c.name) + ' art" onerror="this.src=\'/assets/favicon.png\'">' +
        '<div class="char-card-info">' +
        '<div class="char-card-name">' + esc(c.name) + '</div>' +
        '<div class="char-card-type' + typeClass + '">' + esc(TEAM_LABEL[c.team] || c.team) + '</div>' +
        '<div class="char-card-ability">' + esc(c.ability || '') + '</div>' +
        '<span class="char-card-link">View Character →</span>' +
        '</div></a>';
    }

    function scriptTile(sc) {
      var n = (sc.characters || []).length;
      var href = '/s/' + encodeURIComponent(sc.slug);
      var headerHTML = sc.header
        ? '<div class="script-card-header"><img loading="lazy" decoding="async" src="/assets/' + esc(sc.header) + '" alt="' + esc(sc.name) + '"></div>'
        : '<div class="script-card-header script-card-header-empty"><span>' + esc(sc.name) + '</span></div>';
      return '<a class="collection-tile script-tile" href="' + esc(href) + '">' +
        headerHTML +
        '<h3 class="collection-name">' + esc(sc.name) + '</h3>' +
        '<div class="collection-footer">' +
          '<span class="collection-count">' + n + ' character' + (n === 1 ? '' : 's') + '</span>' +
          '<span class="collection-arrow">View →</span>' +
        '</div></a>';
    }

    function collectionTile(coll) {
      var name = coll.displayName || coll.slug;
      var href = '/all-characters.html?collection=' + encodeURIComponent(coll.slug);
      var topHTML = coll.header
        ? '<div class="collection-tile-header"><img loading="lazy" decoding="async" src="/assets/' + esc(coll.header) + '" alt="' + esc(name) + '"></div>'
        : '';
      return '<a class="collection-tile" href="' + esc(href) + '">' +
        topHTML +
        '<h3 class="collection-name">' + esc(name) + '</h3>' +
        '<div class="collection-footer">' +
          '<span class="collection-count">' + esc(coll.description || 'Collection') + '</span>' +
          '<span class="collection-arrow">Browse →</span>' +
        '</div></a>';
    }

    function section(title, inner) {
      return '<section class="landing-section">' +
        '<h2 class="type-header">' + esc(title) + '</h2>' +
        '<div class="type-rule"></div>' + inner + '</section>';
    }

    fetch('/api/user?u=' + encodeURIComponent(username))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data || data.error) { fail(data && data.error || 'Could not load this profile.'); return; }
        var p = data.profile;
        document.title = (p.displayName || p.username) + ' — BOTC HomeBrew Wiki';
        var crumb = document.getElementById('crumb');
        if (crumb) crumb.innerHTML =
          '<a href="/index.html">Home</a><span class="sep">›</span>' +
          '<a href="/creators.html">Creators</a><span class="sep">›</span>' +
          '<span class="here">' + esc(p.displayName || p.username) + '</span>';

        var nChars = data.characters.length, nScripts = data.scripts.length, nColls = data.collections.length;
        var avatarInner = p.avatarUrl
          ? '<img src="' + esc(p.avatarUrl) + '" alt="">'
          : esc((p.displayName || p.username || '?').charAt(0).toUpperCase());
        var counts = [];
        if (nChars) counts.push(nChars + ' character' + (nChars === 1 ? '' : 's'));
        if (nScripts) counts.push(nScripts + ' script' + (nScripts === 1 ? '' : 's'));
        if (nColls) counts.push(nColls + ' collection' + (nColls === 1 ? '' : 's'));
        hero.innerHTML =
          '<div class="profile-avatar">' + avatarInner + '</div>' +
          '<div class="profile-hero-text">' +
            '<h1>' + esc(p.displayName || p.username) + '</h1>' +
            '<p class="profile-uname">@' + esc(p.username) + (counts.length ? ' · ' + counts.join(' · ') : '') + '</p>' +
            (p.bio ? '<p class="profile-bio">' + esc(p.bio) + '</p>' : '') +
            (p.joined ? '<p class="profile-joined">Member since ' + esc(fmtDate(p.joined)) + '</p>' : '') +
          '</div>';

        var html = '';
        if (nChars) {
          html += section('Characters', '<div class="type-section"><div class="char-grid">' +
            data.characters.map(charCard).join('') + '</div></div>');
        }
        if (nScripts) {
          html += section('Scripts', '<div class="collections-grid">' +
            data.scripts.map(scriptTile).join('') + '</div>');
        }
        if (nColls) {
          html += section('Collections', '<div class="collections-grid">' +
            data.collections.map(collectionTile).join('') + '</div>');
        }
        if (!html) {
          html = '<p class="profile-empty">' + esc(p.displayName || p.username) + ' hasn’t published anything yet.</p>';
        }
        panel.innerHTML = html;

        // Logged-in visitors get a Message button (not on their own profile);
        // admins additionally get a shortcut to the dashboard.
        fetch('/api/me', { credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (me) {
            if (!me || !me.loggedIn) return;
            var t = hero.querySelector('.profile-hero-text');
            if (!t) return;
            if ((me.username || '').toLowerCase() !== p.username.toLowerCase()) {
              t.insertAdjacentHTML('beforeend',
                '<p style="margin:0"><a class="profile-msg-btn" href="/messages?to=' +
                encodeURIComponent(p.username) + '">&#9993; Message ' + esc(p.displayName || p.username) + '</a></p>');
            }
            if (me.isAdmin) t.insertAdjacentHTML('beforeend',
              '<p style="margin:8px 0 0"><a href="/dashboard" style="color:#e8c46a;font-size:.85rem;font-weight:700">&#9881; Admin Dashboard &rarr;</a></p>');
          })
          .catch(function () {});
      })
      .catch(function () { fail('Could not load this profile.'); });
  })();
  </script>
  <script src="/assets/site.js"></script>
</body>
</html>
