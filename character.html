<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character — BOTC HomeBrew Wiki</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-skull" src="assets/logo_skull.png" alt="">
      <span class="brand-text"><b>BOTC</b><br>HomeBrew Wiki</span>
      <img class="topbar-badge" src="assets/ccc-parchment.png" alt="Community Created Content">
    </a>
    <nav class="crumb" aria-label="Breadcrumb" id="crumb">
      <a href="index.html">Characters</a>
    </nav>
    <a class="edit-link" id="edit-btn" style="display:none" href="#">&#9998; Edit</a>
  </header>

  <main class="wrap" id="content">
    <p style="color:rgba(236,225,200,.7);text-align:center;padding:40px">Loading…</p>
  </main>

  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script src="assets/render.js"></script>
  <script>
    var slug = new URLSearchParams(location.search).get('c');
    var content = document.getElementById('content');
    fetch('characters.json?_=' + Date.now())
      .then(function (r) { return r.json(); })
      .then(function (list) {
        var d = list.filter(function (c) { return c.slug === slug; })[0];
        if (!d) {
          content.innerHTML = '<p style="color:rgba(236,225,200,.8);text-align:center;padding:40px">Character not found. <a href="index.html" style="color:#7fb2e6">Back to all characters</a>.</p>';
          return;
        }
        document.title = d.name + ' — BOTC HomeBrew Wiki';
        var label = (window.TEAM_LABEL[d.team] || d.team);
        document.getElementById('crumb').innerHTML =
          '<a href="index.html">Characters</a><span class="sep">›</span>' +
          '<a href="index.html#' + d.team + '">' + label + '</a>' +
          '<span class="sep">›</span><span class="here">' + d.name + '</span>' +
          '';
        var eb = document.getElementById('edit-btn');
        if (eb) { eb.href = 'edit.html?c=' + slug; eb.style.display = ''; }
        content.innerHTML = window.renderCharacter(d, 'assets/' + d.art);
      })
      .catch(function () {
        content.innerHTML = '<p style="color:#e6a">Could not load character data.</p>';
      });
  </script>
</body>
</html>
