<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting… — BOTC HomeBrew Wiki</title>
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
<script>
  // Legacy URL support: character.html?c=slug → c/slug.html
  (function () {
    var slug = new URLSearchParams(location.search).get('c');
    var hash = location.hash || '';
    if (slug) {
      location.replace('c/' + slug + hash);
    } else {
      location.replace('all-characters');
    }
  })();
</script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;padding:40px;color:#555">
    Redirecting… if nothing happens, <a id="fallback" href="all-characters">click here</a>.
  </p>
  <script>
    var slug = new URLSearchParams(location.search).get('c');
    if (slug) document.getElementById('fallback').href = 'c/' + slug;
  </script>
</body>
</html>
