  <script src="assets/tags.js"></script>
  <script>
    function toTitleCase(s) {
      // hyphen-aware: "multi-kill" -> "Multi-Kill" (matches the canonical tags)
      return String(s || '').trim().toLowerCase()
        .replace(/(^|[\s-])[a-z]/g, function(m) { return m.toUpperCase(); });
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;')
        .replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Canonical tag list + descriptions live in assets/tags.js
    var KNOWN_TAGS = window.KNOWN_TAGS || [];

    fetch('characters.json?_=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(list) {
        // Seed tagMap from KNOWN_TAGS, then overlay real counts
        var tagMap = {};
        KNOWN_TAGS.forEach(function(t) { tagMap[t] = 0; });
        list.forEach(function(c) {
          (c.tags || '').split(',').forEach(function(t) {
            t = t.trim();
            if (!t) return;
            var key = toTitleCase(t);
            tagMap[key] = (tagMap[key] || 0) + 1;
          });
        });

        var panel = document.getElementById('panel');
        // Only show tags that at least one character actually has —
        // zero-count pills would just link to empty pages.
        var tags = Object.keys(tagMap).filter(function(t) { return tagMap[t] > 0; }).sort();

        panel.innerHTML =
          '<div class="tags-index">' +
          tags.map(function(tag) {
            var count = tagMap[tag];
            return '<a class="tag-pill" data-tag="' + esc(tag) + '" href="tag?t=' + encodeURIComponent(tag) + '">' +
              esc(tag) +
              '<span class="tag-count">' + count + '</span>' +
              '</a>';
          }).join('') +
          '</div>';
      })
      .catch(function() {
        document.getElementById('panel').innerHTML =
          '<p style="text-align:center;color:#e6a;padding:30px">Could not load tags.</p>';
      });
  </script>
