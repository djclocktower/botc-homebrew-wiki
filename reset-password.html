<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — BOTC HomeBrew Wiki</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .login-wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: clamp(24px,5vw,64px) clamp(12px,3vw,40px) 64px;
    position: relative;
    z-index: 5;
  }
  .login-card {
    background-color: var(--parch);
    background-image: url('assets/parchment.jpg');
    background-size: cover;
    border: 2px solid var(--parch-frame);
    padding: clamp(24px,4vw,40px);
    color: var(--ink);
    box-shadow: 0 20px 48px -16px rgba(0,0,0,.6),
                inset 0 0 0 3px rgba(255,255,255,.3),
                inset 0 0 0 4px var(--parch-frame);
  }
  .login-card h2 {
    font-family: 'Dumbledor2', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: var(--maroon);
    letter-spacing: .06em;
    margin: 0 0 6px;
    text-align: center;
  }
  .login-rule {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--rule), transparent);
    margin: 10px 0 24px;
    border: none;
  }
  .login-field { margin-bottom: 16px; }
  .login-field label {
    display: block;
    font-family: 'TradeGothicLT','Libre Franklin',sans-serif;
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--maroon);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .login-field input {
    width: 100%;
    box-sizing: border-box;
    font-family: 'TradeGothicLT','Libre Franklin',sans-serif;
    font-size: 1rem;
    color: #241a12;
    background: #fffdf8;
    border: 1px solid #cdbfa0;
    border-radius: 6px;
    padding: 11px 13px;
  }
  .login-field input:focus { outline: 2px solid #b98; border-color: #b98; }
  .login-hint {
    font-family: 'TradeGothicLT','Libre Franklin',sans-serif;
    font-size: .78rem;
    color: #6d5b40;
    margin-top: 4px;
  }
  .login-btn {
    width: 100%;
    font-family: 'Dumbledor2', serif;
    font-size: 1.15rem;
    letter-spacing: .05em;
    color: #f4ead2;
    background: linear-gradient(180deg, #7a2d2f, #5b1f21);
    border: 1px solid #4a1719;
    border-radius: 6px;
    padding: 12px;
    cursor: pointer;
    margin-top: 8px;
  }
  .login-btn:hover { background: linear-gradient(180deg, #8a3537, #6b2527); }
  .login-btn:disabled { opacity: .6; cursor: default; }
  .login-msg {
    margin-top: 16px;
    text-align: center;
    font-family: 'TradeGothicLT','Libre Franklin',sans-serif;
    font-size: .95rem;
    min-height: 1.2em;
  }
  .login-msg.error { color: var(--evil, #9a2c2c); }
  .login-msg.success { color: #2a6e2a; }
  .login-status {
    text-align: center;
    font-family: 'TradeGothicLT','Libre Franklin',sans-serif;
    margin-bottom: 18px;
    color: var(--ink);
  }
  .login-status a { color: var(--good-name); }
</style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img class="brand-skull" src="assets/logo_skull.png" alt="">
      <img class="brand-header-text" src="assets/headertext.png" alt="BOTC HomeBrew Wiki">
      <img class="topbar-badge" src="assets/ccc-parchment.png" alt="Community Created Content">
    </a>
    <nav class="crumb" aria-label="Breadcrumb">
      <a href="/">Home</a><span class="sep">·</span><span class="here">Reset Password</span>
    </nav>
  </header>

  <main class="login-wrap">
    <div class="login-card">
      <h2>Choose a New Password</h2>
      <hr class="login-rule">

      <div id="no-token" style="display:none">
        <p class="login-status">This page needs a reset link from your email.<br>
        <a href="login">Request one from the log-in page</a>.</p>
      </div>

      <div id="reset-form">
        <div class="login-field">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" autocomplete="new-password">
          <div class="login-hint">At least 8 characters.</div>
        </div>
        <div class="login-field">
          <label for="confirm-password">Confirm New Password</label>
          <input type="password" id="confirm-password" autocomplete="new-password">
        </div>
        <button class="login-btn" id="reset-btn" type="button">Set New Password</button>
      </div>

      <p class="login-msg" id="reset-msg"></p>
    </div>
  </main>

  <script>
    function $(id){ return document.getElementById(id); }
    var msg = $('reset-msg');
    function setMsg(cls, text){ msg.className = 'login-msg' + (cls ? ' ' + cls : ''); msg.textContent = text || ''; }

    var token = new URLSearchParams(location.search).get('token') || '';
    if (!token) {
      $('reset-form').style.display = 'none';
      $('no-token').style.display = 'block';
    }

    $('reset-btn').addEventListener('click', function () {
      var btn = this;
      var pw = $('new-password').value;
      var pw2 = $('confirm-password').value;
      if (pw.length < 8) { setMsg('error', 'Password must be at least 8 characters.'); return; }
      if (pw !== pw2) { setMsg('error', 'Passwords do not match.'); return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ token: token, password: pw })
      })
        .then(function(r){ return r.json().then(function(d){ return { ok: r.ok, body: d }; }); })
        .then(function(res){
          if (res.ok && res.body.ok) {
            setMsg('success', 'Password updated! You are now logged in. Redirecting…');
            setTimeout(function(){ location.href = 'account'; }, 1000);
          } else {
            setMsg('error', res.body.error || 'Could not reset password.');
            btn.disabled = false; btn.textContent = 'Set New Password';
          }
        })
        .catch(function(){
          setMsg('error', 'Network error. Try again.');
          btn.disabled = false; btn.textContent = 'Set New Password';
        });
    });
    $('confirm-password').addEventListener('keydown', function(e){ if (e.key === 'Enter') $('reset-btn').click(); });
  </script>
</body>
</html>
