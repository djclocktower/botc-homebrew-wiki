<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Character — BOTC HomeBrew Wiki</title>
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .builder{position:relative;z-index:5;max-width:1320px;margin:0 auto;
    padding:clamp(14px,3vw,30px) clamp(12px,3vw,34px) 70px;
    display:grid;grid-template-columns:minmax(0,460px) minmax(0,1fr);gap:26px;align-items:start}
  @media(max-width:980px){.builder{grid-template-columns:1fr}}
  .formcard{background:#f7f6f2;border:1px solid var(--card-edge);border-radius:10px;
    padding:20px 22px;box-shadow:0 10px 26px rgba(40,12,30,.35);color:#241a12}
  .formcard h2{font-family:'Dumbledor2',serif;color:var(--maroon);margin:0 0 4px;font-size:1.35rem}
  .formcard .sub{font-size:.86rem;color:#6b5d49;margin:0 0 18px}
  .fld{margin-bottom:15px}
  .fld label{display:block;font-family:'Oswald',sans-serif;font-weight:600;font-size:.82rem;
    letter-spacing:.04em;text-transform:uppercase;color:#5b4632;margin-bottom:5px}
  .fld .hint{font-weight:400;text-transform:none;letter-spacing:0;color:#8a7a63;font-size:.78rem}
  .fld input[type=text],.fld input[type=number],.fld textarea,.fld select{
    width:100%;font-family:'Libre Franklin',sans-serif;font-size:.95rem;color:#241a12;
    background:#fffdf8;border:1px solid #cdbfa0;border-radius:6px;padding:9px 11px}
  .fld textarea{resize:none;min-height:64px;line-height:1.4;overflow-y:hidden}
  .fld input:focus,.fld textarea:focus,.fld select:focus{outline:2px solid #b98;border-color:#b98}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  fieldset{border:1px dashed #c9b78f;border-radius:8px;padding:12px 14px;margin:0 0 15px}
  legend{font-family:'Oswald',sans-serif;font-weight:600;font-size:.82rem;letter-spacing:.04em;
    text-transform:uppercase;color:#5b4632;padding:0 6px}
  fieldset.import{border-color:#a9c0e0;background:#f2f6fc}
  fieldset.import legend{color:#234f74}
  .jinx-row{display:grid;grid-template-columns:1fr 86px auto;gap:8px;margin-bottom:8px;align-items:start}
  .jinx-row textarea{grid-column:1/-1;min-height:46px}
  .btn{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.04em;cursor:pointer;
    border:none;border-radius:7px;padding:9px 16px;font-size:.9rem}
  .btn-sm{padding:6px 12px;font-size:.82rem}
  .btn-ghost{background:#ece3d2;color:#5b4632}
  .btn-ghost:hover{background:#e0d5bf}
  .btn-blue{background:#2f6fb8;color:#fff}
  .btn-blue:hover{filter:brightness(1.08)}
  .btn-del{background:#e7d3d3;color:#9A0D12}
  .btn-save{background:linear-gradient(180deg,#2f6fb8,#1a4a82);color:#eaf0fc;font-size:1rem;padding:12px 22px}
  .btn-save:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .artthumb{margin-top:8px;max-width:130px;max-height:130px;border:1px solid #cdbfa0;
    border-radius:6px;background:#fffdf8;display:none}
  .slug-pill{display:inline-block;font-family:ui-monospace,Consolas,monospace;font-size:.82rem;
    background:#ece3d2;border:1px solid #c9b78f;border-radius:4px;padding:2px 8px;color:#5b4632}
  .loading-msg{position:relative;z-index:5;text-align:center;
    color:rgba(236,225,200,.7);padding:60px 20px;font-size:1.1rem}
  .ck{display:flex;align-items:center;gap:8px}
  .ck input{width:auto}
  #ability-count { font-size:.78rem; color:#8a7a63; float:right; margin-top:3px; }
  .preview-pane{position:sticky;top:74px}
  .preview-label{font-family:'Dumbledor2',serif;color:var(--parch);letter-spacing:.06em;
    font-size:1rem;margin:0 0 10px;opacity:.85}
  #preview{width:100%;height:78vh;border:1px solid rgba(214,196,150,.3);
    border-radius:10px;background:#1d0a1a;box-shadow:0 10px 26px rgba(0,0,0,.5)}
  #status,#importmsg{margin-top:10px;padding:10px 13px;border-radius:8px;font-size:.9rem;display:none}
  #status.ok,#importmsg.ok{display:block;background:#dff0e2;color:#1c5429;border:1px solid #9bcfa9}
  #status.err,#importmsg.err{display:block;background:#f6dede;color:#9A0D12;border:1px solid #d99}
  #status.work,#importmsg.work{display:block;background:#e9eefb;color:#234f74;border:1px solid #aac0e6}
  #status a{color:inherit;font-weight:700}
</style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-skull" src="assets/logo_skull.png" alt="">
      <span class="brand-text"><b>BOTC</b><br>HomeBrew Wiki</span>
      <img class="topbar-badge" src="assets/ccc-parchment.png" alt="Community Created Content">
    </a>
    <nav class="crumb" id="crumb">
      <a href="index.html">Characters</a><span class="sep">›</span>
      <span class="here">Edit</span>
    </nav>
    <div class="search-wrap" id="search-wrap">
      <input class="search-input" id="search-input" type="search" placeholder="Search characters…" autocomplete="off" aria-label="Search characters" aria-expanded="false" aria-haspopup="listbox">
      <div class="search-drop" id="search-drop" role="listbox" aria-label="Search results" hidden></div>
    </div>
  </header>

  <div class="loading-msg" id="loading">Loading character&hellip;</div>

  <div class="builder" id="builder" style="display:none">

    <div class="formcard">
      <h2>Edit Character</h2>
      <p class="sub" id="edit-sub">Loading&hellip;</p>

      <fieldset class="import">
        <legend>Import from JSON (optional)</legend>
        <p class="sub" style="margin:0 0 8px">Paste or upload an official-schema JSON to overwrite ability, flavour, night order, reminders &amp; jinxes.</p>
        <div class="fld" style="margin-bottom:8px"><input type="file" id="jsonfile" accept=".json,application/json"></div>
        <div class="fld" style="margin-bottom:8px"><textarea id="jsonpaste" placeholder="&hellip;or paste JSON here"></textarea></div>
        <button type="button" class="btn btn-blue btn-sm" id="importjson">Import &amp; Autofill</button>
        <div id="importmsg"></div>
      </fieldset>

      <div class="fld">
        <label for="name">Character name *</label>
        <input type="text" id="name">
        <div class="sub" style="margin-top:5px">Slug: <span class="slug-pill" id="slug-display">&hellip;</span></div>
      </div>
      <div class="row2">
        <div class="fld">
          <label for="team">Team *</label>
          <select id="team">
            <option value="townsfolk">Townsfolk</option>
            <option value="outsider">Outsider</option>
            <option value="minion">Minion</option>
            <option value="demon">Demon</option>
            <option value="traveller">Traveller</option>
            <option value="fabled">Fabled</option>
          </select>
        </div>
        <div class="fld">
          <label for="creator">Creator</label>
          <input type="text" id="creator">
        </div>
      </div>
      <div class="fld">
        <label for="ability">Ability line * <span class="hint">(also the JSON ability)</span></label>
        <textarea id="ability"></textarea>
        <span id="ability-count">0 characters</span>
      </div>
      <div class="fld">
        <label for="lede">Lede <span class="hint">(one flavour sentence under the ability)</span></label>
        <input type="text" id="lede">
      </div>
      <div class="fld">
        <label for="bullets">Summary bullets <span class="hint">(one per line)</span></label>
        <textarea id="bullets"></textarea>
      </div>
      <div class="fld">
        <label for="howto">How to Run <span class="hint">(one paragraph per line &middot; [[TOKEN]] for reminder pills)</span></label>
        <textarea id="howto"></textarea>
      </div>
      <div class="fld">
        <label for="callout">How-to-Run note <span class="hint">(optional callout box)</span></label>
        <input type="text" id="callout">
      </div>
      <div class="fld">
        <label for="examples">Examples <span class="hint">(one per line)</span></label>
        <textarea id="examples"></textarea>
      </div>
      <div class="fld">
        <label for="tips">Tips &amp; Tricks <span class="hint">(one per line)</span></label>
        <textarea id="tips"></textarea>
      </div>
      <div class="fld" id="bluffing-fld" style="display:none">
        <label for="bluffing">Bluffing as the <span id="bluffing-label">Character</span> <span class="hint">(one per line)</span></label>
        <textarea id="bluffing"></textarea>
      </div>
      <div class="fld" id="fighting-fld" style="display:none">
        <label for="fighting">Fighting the <span id="fighting-label">Character</span> <span class="hint">(one per line)</span></label>
        <textarea id="fighting"></textarea>
      </div>
      <div class="row2">
        <div class="fld">
          <label for="quote">Flavour quote <span class="hint">(JSON flavor)</span></label>
          <input type="text" id="quote">
        </div>
        <div class="fld">
          <label for="appears">Appears in</label>
          <input type="text" id="appears">
        </div>
      </div>
      <div class="fld">
        <label for="tags">Tags</label>
        <input type="text" id="tags">
      </div>
      <div class="fld">
        <label for="art">Character art <span class="hint">(leave blank to keep existing)</span></label>
        <input type="file" id="art" accept="image/*">
        <img id="artthumb" class="artthumb" alt="current art">
        <div id="arturl" class="sub" style="margin-top:6px"></div>
      </div>

      <fieldset>
        <legend>Night Order &amp; Tokens (for JSON export)</legend>
        <div class="fld">
          <label for="edition">Edition <span class="hint">(optional, e.g. experimental)</span></label>
          <input type="text" id="edition">
        </div>
        <div class="row2">
          <div class="fld">
            <label for="firstNight">First-night wake priority <span class="hint">(0 = doesn&rsquo;t wake)</span></label>
            <input type="number" id="firstNight" value="0" min="0" step="0.01">
          </div>
          <div class="fld">
            <label for="otherNight">Other-nights wake priority</label>
            <input type="number" id="otherNight" value="0" min="0" step="0.01">
          </div>
        </div>
        <div class="fld">
          <label for="fnReminder">First-night reminder</label>
          <textarea id="fnReminder"></textarea>
        </div>
        <div class="fld">
          <label for="onReminder">Other-nights reminder</label>
          <textarea id="onReminder"></textarea>
        </div>
        <div class="fld">
          <label for="reminders">Reminder tokens <span class="hint">(one per line)</span></label>
          <textarea id="reminders"></textarea>
        </div>
        <div class="fld">
          <label for="remindersGlobal">Global reminder tokens <span class="hint">(optional)</span></label>
          <textarea id="remindersGlobal"></textarea>
        </div>
        <div class="fld ck">
          <input type="checkbox" id="setup">
          <label for="setup" style="margin:0">Affects setup (e.g. [+1 Outsider])</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Jinxes</legend>
        <div id="jinxes"></div>
        <button type="button" class="btn btn-ghost btn-sm" id="addjinx">+ Add jinx</button>
      </fieldset>

      <button type="button" class="btn btn-save" id="save">Save Changes</button>
      <div id="status"></div>
    </div>

    <div class="preview-pane">
      <p class="preview-label">Live preview</p>
      <iframe id="preview" title="Character preview"></iframe>
    </div>

  </div>

  <script src="assets/render.js"></script>
  <script>
    var WORKER_URL = 'https://botc-wiki-proxy.djclocktower.workers.dev/gh';
    var SITE_ROOT  = new URL('.', location.href).href;
    var ART_BASE   = 'https://botchomebrew.wiki/assets/art/';
    var $ = function(id){ return document.getElementById(id); };

    var originalSlug  = new URLSearchParams(location.search).get('c') || '';
    var originalEntry = null;
    var artChanged    = false;
    var artDataURL    = null;

    // ── jinx rows ──
    function addJinx(name, align, text){
      var row = document.createElement('div'); row.className = 'jinx-row';
      row.innerHTML =
        '<input type="text" class="jx-name" placeholder="Jinxed character">' +
        '<select class="jx-align"><option value="good">Good</option><option value="evil">Evil</option></select>' +
        '<button type="button" class="btn btn-del btn-sm jx-del">&#10005;</button>' +
        '<textarea class="jx-text" placeholder="Jinx rule text&hellip;"></textarea>';
      $('jinxes').appendChild(row);
      if(name)  row.querySelector('.jx-name').value  = name;
      if(align) row.querySelector('.jx-align').value = align;
      if(text)  row.querySelector('.jx-text').value  = text;
      row.querySelector('.jx-del').addEventListener('click', function(){ row.remove(); update(); });
      row.querySelectorAll('input,select,textarea').forEach(function(el){ el.addEventListener('input', update); });
    }
    $('addjinx').addEventListener('click', function(){ addJinx(); });

    function lines(id){ return $(id).value.split('\n').map(function(s){return s.trim();}).filter(Boolean); }

    function gather(){
      var jinxes = [];
      document.querySelectorAll('.jinx-row').forEach(function(r){
        var n = r.querySelector('.jx-name').value.trim();
        if(n) jinxes.push({name:n, align:r.querySelector('.jx-align').value,
                           text:r.querySelector('.jx-text').value.trim()});
      });
      return {
        name: $('name').value.trim(), team: $('team').value,
        creator: $('creator').value.trim(), ability: $('ability').value.trim(),
        lede: $('lede').value.trim(), summaryBullets: lines('bullets'),
        howToRun: lines('howto'), callout: $('callout').value.trim(),
        examples: lines('examples'), tips: lines('tips'),
        bluffing: lines('bluffing'), fighting: lines('fighting'),
        quote: $('quote').value.trim(), appearsIn: $('appears').value.trim(),
        tags: $('tags').value.trim(), edition: $('edition').value.trim(),
        firstNight: Number($('firstNight').value)||0,
        firstNightReminder: $('fnReminder').value.trim(),
        otherNight: Number($('otherNight').value)||0,
        otherNightReminder: $('onReminder').value.trim(),
        reminders: lines('reminders'), remindersGlobal: lines('remindersGlobal'),
        setup: $('setup').checked, jinxes: jinxes
      };
    }

    // ── live preview ──
    var PREVIEW_SCRIPT =
      '<scr'+'ipt>document.addEventListener("click",function(e){' +
      'var t=e.target.closest&&e.target.closest(".json-bar-toggle");' +
      'if(t){var b=t.closest(".json-box");var o=b.classList.toggle("open");b.querySelector(".json-body").hidden=!o;}' +
      'var c=e.target.closest&&e.target.closest(".json-copy");' +
      'if(c){var b=c.closest(".json-box");navigator.clipboard&&navigator.clipboard.writeText(b.querySelector("code").textContent);}' +
      '});<\/scr'+'ipt>';

    function update(){
      var d = gather();
      var src = artDataURL || (originalEntry ? SITE_ROOT+'assets/'+originalEntry.art : '');
      var inner = window.renderCharacter(d, src);
      var doc = '<!doctype html><html><head><meta charset="utf-8"><base href="'+SITE_ROOT+'">' +
        '<link rel="stylesheet" href="assets/styles.css"></head><body>' +
        '<header class="topbar"><a class="brand"><img class="brand-skull" src="assets/logo_skull.png" alt="">' +
        '<span class="brand-text"><b>BOTC</b><br>HomeBrew Wiki</span>' +
        '<img class="topbar-badge" src="assets/ccc-parchment.png" alt=""></a></header>' +
        '<main class="wrap">'+inner+'</main>'+PREVIEW_SCRIPT+'</body></html>';
      $('preview').srcdoc = doc;
    }

    var deb;
    function schedule(){ clearTimeout(deb); deb = setTimeout(update, 250); }
    ['name','team','creator','ability','lede','bullets','howto','callout','examples','tips',
     'quote','appears','tags','edition','firstNight','otherNight','fnReminder','onReminder',
     'reminders','remindersGlobal','setup','bluffing','fighting'].forEach(function(id){
      $(id).addEventListener('input', schedule); $(id).addEventListener('change', schedule);
    });

    // ── art upload ──
    function loadImageToCanvas(src, crossOrigin){
      return new Promise(function(resolve, reject){
        var img = new Image(); if(crossOrigin) img.crossOrigin='anonymous';
        img.onload = function(){
          var max=600, w=img.width, h=img.height;
          if(w>max||h>max){ if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
          var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
          cv.getContext('2d').drawImage(img,0,0,w,h);
          try{ resolve(cv.toDataURL('image/png')); }catch(e){ reject(e); }
        };
        img.onerror = function(){ reject(new Error('load failed')); };
        img.src = src;
      });
    }
    $('art').addEventListener('change', function(e){
      var file = e.target.files[0]; if(!file) return;
      var reader = new FileReader();
      reader.onload = function(ev){
        loadImageToCanvas(ev.target.result, false).then(function(url){
          artDataURL = url; artChanged = true;
          var th=$('artthumb'); th.src=url; th.style.display='block';
          update();
        });
      };
      reader.readAsDataURL(file);
    });

    // ── JSON import ──
    function normalizeJinx(j){
      return { name: j.name||j.id||'', align: j.align||'good', text: j.text||j.reason||'' };
    }
    function applyImport(obj){
      function set(id,v){ if(v!=null) $(id).value=v; }
      set('name', obj.name||'');
      if(obj.team && $('team').querySelector('option[value="'+obj.team+'"]')) $('team').value=obj.team;
      set('ability', obj.ability||'');
      set('quote', (obj.flavor||'').replace(/^["']|["']$/g,''));
      set('edition', obj.edition||'');
      set('firstNight', obj.firstNight!=null?obj.firstNight:0);
      set('otherNight', obj.otherNight!=null?obj.otherNight:0);
      set('fnReminder', obj.firstNightReminder||'');
      set('onReminder', obj.otherNightReminder||'');
      set('reminders', (obj.reminders||[]).join('\n'));
      set('remindersGlobal', (obj.remindersGlobal||[]).join('\n'));
      $('setup').checked = !!obj.setup;
      document.querySelectorAll('.jinx-row').forEach(function(r){ r.remove(); });
      (obj.jinxes||[]).forEach(function(j){ var n=normalizeJinx(j); addJinx(n.name,n.align,n.text); });
      if(!(obj.jinxes||[]).length) addJinx();
      var imgUrl = Array.isArray(obj.image)?obj.image[0]:obj.image;
      var msg = $('importmsg');
      if(imgUrl){
        msg.className='work'; msg.textContent='Trying to load icon from '+imgUrl+' …';
        loadImageToCanvas(imgUrl,true).then(function(url){
          artDataURL=url; artChanged=true;
          var th=$('artthumb'); th.src=url; th.style.display='block';
          $('arturl').textContent='';
          msg.className='ok'; msg.textContent='Imported (icon loaded).'; update();
        }).catch(function(){
          artDataURL=null; artChanged=false;
          $('arturl').innerHTML='Icon URL: <a href="'+imgUrl+'" target="_blank">'+imgUrl+'</a>';
          msg.className='ok'; msg.textContent='Imported. Upload art manually if you want to change the icon.'; update();
        });
      } else {
        msg.className='ok'; msg.textContent='Imported successfully.';
      }
      update();
    }
    $('importjson').addEventListener('click', function(){
      var raw = $('jsonpaste').value.trim();
      var go = function(text){
        try{
          var data = JSON.parse(text), obj = data;
          if(Array.isArray(data)){
            obj = data.filter(function(x){ return x&&typeof x==='object'&&x.id!=='_meta'&&x.ability; })[0];
            if(!obj) throw new Error('No character with an ability found in that array.');
          }
          if(!obj||!obj.ability) throw new Error('No "ability" field found.');
          applyImport(obj);
        }catch(e){ var m=$('importmsg'); m.className='err'; m.textContent='Import failed: '+e.message; }
      };
      if(raw){ go(raw); return; }
      var f=$('jsonfile').files[0];
      if(!f){ var m=$('importmsg'); m.className='err'; m.textContent='Choose a file or paste JSON first.'; return; }
      var fr=new FileReader(); fr.onload=function(ev){ go(ev.target.result); }; fr.readAsText(f);
    });

    // ── populate form from entry ──
    function populateForm(entry){
      originalEntry = entry;
      $('name').value            = entry.name || '';
      $('team').value            = entry.team || 'townsfolk';
      $('creator').value         = entry.creator || '';
      $('ability').value         = entry.ability || '';
      (function(){ var ta=$('ability'),ct=document.getElementById('ability-count'); if(ta&&ct){ var n=ta.value.length; ct.textContent=n+' character'+(n===1?'':'s'); } })();
      $('lede').value            = entry.lede || '';
      $('bullets').value         = (entry.summaryBullets || []).join('\n');
      $('howto').value           = (entry.howToRun || []).join('\n');
      $('callout').value         = entry.callout || '';
      $('examples').value        = (entry.examples || []).join('\n');
      $('tips').value            = (entry.tips || []).join('\n');
      $('bluffing').value        = (entry.bluffing || []).join('\n');
      $('fighting').value        = (entry.fighting || []).join('\n');
      $('quote').value           = entry.quote || entry.flavor || '';
      $('appears').value         = entry.appearsIn || '';
      $('tags').value            = entry.tags || '';
      $('edition').value         = entry.edition || '';
      $('firstNight').value      = entry.firstNight || 0;
      $('otherNight').value      = entry.otherNight || 0;
      $('fnReminder').value      = entry.firstNightReminder || '';
      $('onReminder').value      = entry.otherNightReminder || '';
      $('reminders').value       = (entry.reminders || []).join('\n');
      $('remindersGlobal').value = (entry.remindersGlobal || []).join('\n');
      $('setup').checked         = !!entry.setup;
      $('slug-display').textContent = originalSlug;
      // expand textareas to fit loaded content
      document.querySelectorAll('.fld textarea').forEach(function(ta) { autoExpand(ta); });

      document.querySelectorAll('.jinx-row').forEach(function(r){ r.remove(); });
      (entry.jinxes || []).forEach(function(j){ var n=normalizeJinx(j); addJinx(n.name,n.align,n.text); });
      if(!(entry.jinxes||[]).length) addJinx();

      var artURL = SITE_ROOT + 'assets/' + entry.art;
      $('arturl').textContent = 'Current: ' + entry.art;
      loadImageToCanvas(artURL, true).then(function(url){
        artDataURL = url; artChanged = false;
        var th=$('artthumb'); th.src=url; th.style.display='block';
        $('arturl').textContent = '';
        update();
      }).catch(function(){
        artDataURL = null;
        update();
      });

      $('crumb').innerHTML =
        '<a href="index.html">Characters</a><span class="sep">›</span>'+
        '<a href="'+(entry.page||'#')+'">'+(entry.name||originalSlug)+'</a>'+
        '<span class="sep">›</span><span class="here">Edit</span>';
      $('edit-sub').textContent = 'Editing: ' + entry.name;
      document.title = 'Edit ' + entry.name + ' — BOTC HomeBrew Wiki';
      updatePerspectiveFields();
      update();
    }

    // ── show/hide bluffing & fighting fields based on team ──
    var GOOD_TEAMS = { townsfolk: 1, outsider: 1 };
    function updatePerspectiveFields() {
      var team = $('team').value;
      var name = $('name').value.trim() || 'Character';
      var isGood = !!GOOD_TEAMS[team];
      $('bluffing-fld').style.display = isGood ? '' : 'none';
      $('fighting-fld').style.display = !isGood ? '' : 'none';
      $('bluffing-label').textContent = name;
      $('fighting-label').textContent = name;
    }
    $('team').addEventListener('change', updatePerspectiveFields);
    $('name').addEventListener('input', updatePerspectiveFields);
    // ── ability character counter ──
    (function() {
      var ta = $('ability'), ct = document.getElementById('ability-count');
      if (!ta || !ct) return;
      function update() { var n = ta.value.length; ct.textContent = n + ' character' + (n === 1 ? '' : 's'); }
      ta.addEventListener('input', update);
      update();
    })();

    // ── auto-expanding textareas ──
    function autoExpand(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }
    document.querySelectorAll('.fld textarea').forEach(function(ta) {
      ta.style.overflowY = 'hidden';
      ta.addEventListener('input', function() { autoExpand(ta); });
      autoExpand(ta);
    });

    // ── Worker API helpers ──
    function workerGet(path){
      return fetch(WORKER_URL + '?path=' + encodeURIComponent(path))
        .then(function(r){ return r.json(); })
        .then(function(j){ if(j && j.error) throw new Error(j.error); return j; });
    }
    function workerPut(path, contentB64, message, sha){
      return fetch(WORKER_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: path, content: contentB64, message: message, sha: sha || undefined })
      }).then(function(r){ return r.json(); })
        .then(function(j){ if(j && j.error) throw new Error(j.error); return j; });
    }
    function setStatus(cls,html){ var s=$('status'); s.className=cls; s.innerHTML=html; }

    // ── save ──
    $('save').addEventListener('click', function(){
      var d = gather();
      if(!d.name)    return setStatus('err','A character name is required.');
      if(!d.ability) return setStatus('err','An ability line is required.');

      $('save').disabled = true;
      var p = Promise.resolve();

      if(artChanged && artDataURL){
        setStatus('work','Saving&hellip; uploading new art');
        var artPath = 'assets/art/'+originalSlug+'.png';
        var artB64  = artDataURL.split(',')[1];
        p = p.then(function(){
          return workerGet(artPath).then(function(ex){
            return workerPut(artPath, artB64, 'Update art for '+d.name, ex && ex.sha);
          });
        });
      }

      p = p.then(function(){
        setStatus('work','Saving&hellip; updating character list');
        return workerGet('characters.json');
      }).then(function(file){
        var list=[], sha=null;
        if(file){
          sha = file.sha;
          try{ list = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))))); }
          catch(e){ list=[]; }
        }
        var i = list.findIndex(function(c){ return c.slug===originalSlug; });
        var base = (i>=0) ? list[i] : (originalEntry||{});
        var entry = Object.assign({}, base, {
          slug: originalSlug,
          name: d.name, team: d.team, ability: d.ability,
          creator: d.creator, lede: d.lede, summaryBullets: d.summaryBullets,
          howToRun: d.howToRun, callout: d.callout, examples: d.examples,
          tips: d.tips, bluffing: d.bluffing, fighting: d.fighting, quote: d.quote, appearsIn: d.appearsIn, tags: d.tags,
          edition: d.edition, firstNight: d.firstNight,
          firstNightReminder: d.firstNightReminder, otherNight: d.otherNight,
          otherNightReminder: d.otherNightReminder, reminders: d.reminders,
          remindersGlobal: d.remindersGlobal, setup: d.setup, jinxes: d.jinxes
        });
        if(artChanged){
          entry.art   = 'art/'+originalSlug+'.png';
          entry.image = ART_BASE+originalSlug+'.png';
        }
        if(i>=0) list[i]=entry; else list.push(entry);
        var jsonB64 = btoa(unescape(encodeURIComponent(JSON.stringify(list,null,2))));
        return workerPut('characters.json', jsonB64, 'Edit character: '+d.name, sha);
      }).then(function(){
        var url = SITE_ROOT + (originalEntry&&originalEntry.page ? originalEntry.page : 'character.html?c='+originalSlug);
        setStatus('ok','&#10003; Saved! Live in ~1 minute. <a href="'+url+'" target="_blank">View character &rarr;</a>');
        $('save').disabled = false;
      }).catch(function(err){
        setStatus('err','&#10007; '+err.message);
        $('save').disabled = false;
      });
    });

    // ── on load: fetch character data ──
    if(!originalSlug){
      $('loading').textContent = 'No character specified. Add ?c=slug to the URL.';
    } else {
      fetch('characters.json?_='+Date.now())
        .then(function(r){ return r.json(); })
        .then(function(list){
          var entry = list.filter(function(c){ return c.slug===originalSlug; })[0];
          if(!entry){
            $('loading').textContent = 'Character "'+originalSlug+'" not found in characters.json.';
            return;
          }
          $('loading').style.display = 'none';
          $('builder').style.display = 'grid';
          populateForm(entry);
        })
        .catch(function(){
          $('loading').textContent = 'Could not load characters.json.';
        });
    }
  </script>

  <script>
  (function(){
    var input=document.getElementById('search-input'),drop=document.getElementById('search-drop');
    if(!input||!drop)return;
    var allChars=null,fetchPromise=null;
    function ensureData(){if(allChars)return Promise.resolve(allChars);if(fetchPromise)return fetchPromise;fetchPromise=fetch('characters.json?_='+Date.now()).then(function(r){return r.json();}).then(function(l){allChars=l;return l;});return fetchPromise;}
    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    var GOOD={townsfolk:1,outsider:1},TL={townsfolk:'Townsfolk',outsider:'Outsider',minion:'Minion',demon:'Demon',traveller:'Traveller',fabled:'Fabled'};
    function search(q){q=q.trim().toLowerCase();if(!q||!allChars)return[];return allChars.filter(function(c){return[c.name||'',c.ability||'',c.tags||'',c.lede||'',c.team||''].join(' ').toLowerCase().indexOf(q)!==-1;}).slice(0,8);}
    function render(rs,q){if(!rs.length){drop.innerHTML='<div class="search-empty">No characters found for \u201c'+esc(q)+'\u201d</div>';return;}drop.innerHTML=rs.map(function(c){var tc=GOOD[c.team]?' good':'';var ab=c.ability||'';if(ab.length>80)ab=ab.slice(0,80)+'\u2026';return'<a class="search-result" href="'+esc(c.page)+'" role="option"><img class="search-result-thumb" src="'+esc('assets/'+c.art)+'" alt=""><div class="search-result-info"><span class="search-result-name">'+esc(c.name)+'</span><span class="search-result-type'+tc+'">'+esc(TL[c.team]||c.team)+'</span><span class="search-result-ability">'+esc(ab)+'</span></div></a>';}).join('');}
    function open(){drop.hidden=false;input.setAttribute('aria-expanded','true');}
    function close(){drop.hidden=true;input.setAttribute('aria-expanded','false');}
    var deb;
    input.addEventListener('input',function(){clearTimeout(deb);var q=input.value.trim();if(!q){close();return;}deb=setTimeout(function(){ensureData().then(function(){render(search(q),q);open();});},150);});
    input.addEventListener('focus',function(){if(input.value.trim()&&allChars)open();});
    input.addEventListener('keydown',function(e){if(e.key==='Escape'){close();input.blur();return;}if(e.key==='ArrowDown'){var f=drop.querySelector('.search-result');if(f){e.preventDefault();f.focus();}return;}});
    drop.addEventListener('keydown',function(e){var cur=document.activeElement;if(e.key==='ArrowDown'){e.preventDefault();var n=cur.nextElementSibling;if(n)n.focus();}else if(e.key==='ArrowUp'){e.preventDefault();var p=cur.previousElementSibling;if(p)p.focus();else input.focus();}else if(e.key==='Escape'){close();input.focus();}});
    document.addEventListener('click',function(e){if(!document.getElementById('search-wrap').contains(e.target))close();});
    document.getElementById('search-wrap').addEventListener('mouseenter',ensureData);
  })();
  </script>

</body>
