<!DOCTYPE html>
<html lang="en" class="redesign-on">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Characters — BOTC HomeBrew Wiki</title>
<meta name="description" content="All homebrew characters on the BOTC HomeBrew Wiki — filter fan-made Blood on the Clocktower characters by team, tag, and collection.">
<meta property="og:site_name" content="BOTC HomeBrew Wiki">
<meta property="og:title" content="All Characters">
<meta property="og:description" content="All homebrew characters on the BOTC HomeBrew Wiki — filter fan-made Blood on the Clocktower characters by team, tag, and collection.">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/header-redesign.css">
</head>
<body>

  <header class="topbar">
    <div class="brand-group">
      <a class="brand" href="/">
        <img class="brand-skull" src="assets/logo_skull.png" alt="">
        <img class="brand-header-text" src="assets/headertext.png" alt="BOTC HomeBrew Wiki">
      </a>
      <img class="topbar-badge" src="assets/ccc-parchment.png" alt="Community Created Content">
    </div>
    <nav class="crumb" aria-label="Primary">
      <a href="all-characters">All Characters</a>
      <a href="scripts">Scripts</a>
      <a href="all-collections">Collections</a>
      <a href="script">Script Builder</a>
    </nav>
    <div class="search-wrap" id="search-wrap">
      <input class="search-input" id="search-input" type="search" placeholder="Search characters…" autocomplete="off" aria-label="Search characters" aria-expanded="false" aria-haspopup="listbox">
      <div class="search-drop" id="search-drop" role="listbox" aria-label="Search results" hidden></div>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Navigation menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>
  <nav class="nav-dropdown" id="nav-dropdown" aria-label="Mobile navigation">
    <div class="nav-dropdown-search">
      <input type="search" id="nav-search-input" placeholder="Search characters…" autocomplete="off">
    </div>
    <a href="/">Home</a>
    <a href="all-characters">All Characters</a>
    <a href="scripts">Scripts</a>
    <a href="all-collections">Collections</a>
    <a href="script">Script Builder</a>
  </nav>

  <!-- Fixed left sidebar -->


  <div class="home-hero">
    <h1 id="hero-title">All Characters</h1>
    <p id="hero-subtitle">Every fan-made character in the wiki, grouped by team.</p>
  </div>

  <div class="home-panel" style="padding-bottom:0">
    <button type="button" id="filter-toggle" class="filter-toggle" hidden aria-expanded="false" aria-controls="filter-bar">Filters <span class="filter-toggle-arrow">&#9662;</span></button>
    <div id="filter-bar" class="filter-bar" hidden></div>
    <p id="filter-count" class="filter-count" hidden></p>
  </div>
  <main class="home-panel" id="panel">
    <div class="char-grid">
      <div class="skel skel-card" style="height:120px"></div>
      <div class="skel skel-card" style="height:120px"></div>
      <div class="skel skel-card" style="height:120px"></div>
      <div class="skel skel-card" style="height:120px"></div>
    </div>
  </main>


  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script src="assets/render.js"></script>
  <script src="assets/tags.js"></script>
  <script>
    var TEAMS = [
      ['townsfolk', 'Townsfolk'], ['outsider', 'Outsider'],
      ['minion', 'Minion'], ['demon', 'Demon'],
      ['traveller', 'Traveller'], ['fabled', 'Fabled']
    ];
    var GOOD = { townsfolk: 1, outsider: 1 };
    window.TEAM_LABEL = window.TEAM_LABEL || {
      townsfolk: 'Townsfolk', outsider: 'Outsider', minion: 'Minion',
      demon: 'Demon', traveller: 'Traveller', fabled: 'Fabled'
    };
    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;')
        .replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function card(c) {
      var typeClass = GOOD[c.team] ? ' good' : '';
      return '<a class="char-card" href="' + esc(c.page) + '">' +
        '<img loading="lazy" decoding="async" class="char-card-thumb" src="' + esc(c.art ? 'assets/' + c.art : (typeof c.image === 'string' && c.image ? c.image : 'assets/favicon.png')) + '" alt="' + esc(c.name) + ' art" onerror="this.src=\'assets/favicon.png\'">' +
        '<div class="char-card-info">' +
        '<div class="char-card-name">' + esc(c.name) + '</div>' +
        '<div class="char-card-type' + typeClass + '">' + esc(window.TEAM_LABEL[c.team] || c.team) + '</div>' +
        '<div class="char-card-ability">' + esc(c.ability || '') + '</div>' +
        '<span class="char-card-link">View Character →</span>' +
        '</div></a>';
    }
    function norm(s) { return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, ''); }
    // Collection definitions are loaded from collections.json (built live
    // from D1); a "Standalone" pseudo-collection is appended after the fetch.
    var AC_COLLECTIONS = [];
    // Resolve a collection param to its definition using slug or match arrays
    function findCollection(param) {
      if (!param) return null;
      var n = norm(param);
      for (var i = 0; i < AC_COLLECTIONS.length; i++) {
        var c = AC_COLLECTIONS[i];
        if (norm(c.slug) === n || norm(c.displayName) === n) return c;
        if (c.match.indexOf(n) !== -1) return c;
      }
      return null;
    }
    // Hybrid membership: a character belongs if its "Appears in" matches a
    // collection's match[] OR it's explicitly in include[], minus exclude[].
    function inCollection(c, coll) {
      if ((coll.exclude || []).indexOf(c.slug) !== -1) return false;
      if ((coll.include || []).indexOf(c.slug) !== -1) return true;
      return coll.match.indexOf(norm(c.appearsIn)) !== -1;
    }
    function charMatchesCollection(c, coll) {
      if (!coll) return true;
      if (coll.slug === 'Standalone') {
        // standalone = belongs to no recognized collection
        for (var i = 0; i < AC_COLLECTIONS.length - 1; i++) {  // skip Standalone itself
          if (inCollection(c, AC_COLLECTIONS[i])) return false;
        }
        return true;
      }
      return inCollection(c, coll);
    }
    // Slugs that appear in at least one homebrew script (scripts.json), for the
    // "Source" filter. Populated once the data loads.
    var SCRIPT_SLUGS = {};
    // A character's source category: a collection (Appears in matches a collection)
    // takes precedence over a script (listed in a homebrew script). null = neither.
    function sourceOf(c){
      for (var i = 0; i < AC_COLLECTIONS.length; i++) {
        var coll = AC_COLLECTIONS[i];
        if (coll.standalone) continue;
        if (inCollection(c, coll)) return 'collection';
      }
      if (SCRIPT_SLUGS[norm(c.slug)]) return 'script';
      return null;
    }
    var SOURCE_LABELS = [['collection','From Collection'],['script','From Script']];
    function sourceLabel(v){ for (var i=0;i<SOURCE_LABELS.length;i++){ if (SOURCE_LABELS[i][0]===v) return SOURCE_LABELS[i][1]; } return v; }

    var COLLECTION_PARAM = (function(){
      try { var p = new URLSearchParams(location.search).get('collection'); return p ? decodeURIComponent(p) : null; }
      catch (e) { return null; }
    })();

    // Filter state
    var STATE = { includeTeams: [], excludeTeams: [], includeTags: [], excludeTags: [], includeSources: [], excludeSources: [], creator: '', sort: 'name-asc' };
    var FULL = [];   // collection-scoped full list

    function splitTags(c){ return (c.tags||'').split(',').map(function(s){return s.trim();}).filter(Boolean); }

    function titleCase(s){ return String(s||'').trim().toLowerCase().replace(/(^|[\s-])[a-z]/g, function(m){ return m.toUpperCase(); }); }

    function buildFilterBar(list){
      var bar = document.getElementById('filter-bar');
      // Collect tags & creators (canonical tag list lives in assets/tags.js)
      // Only offer tag chips for tags that appear in the current list —
      // on collection views this keeps the bar from being a wall of unused chips.
      var tagSet = {}, creatorSet = {};
      list.forEach(function(c){
        splitTags(c).forEach(function(t){ tagSet[titleCase(t)] = 1; });
        if (c.creator && c.creator.trim()) creatorSet[c.creator.trim()] = 1;
      });
      var tags = Object.keys(tagSet).sort();
      var creators = Object.keys(creatorSet).sort(function(a,b){ return a.toLowerCase()<b.toLowerCase()?-1:1; });

      var html = '';
      // Teams
      html += '<div class="filter-group"><span class="filter-group-label">Team</span><div class="filter-chips" id="fc-teams">';
      TEAMS.forEach(function(t){
        if (!list.some(function(c){return c.team===t[0];})) return;
        html += '<button type="button" class="filter-chip" data-team="'+t[0]+'">'+t[1]+'</button>';
      });
      html += '</div></div>';
      // Tags
      if (tags.length){
        html += '<div class="filter-group"><span class="filter-group-label">Tag</span><div class="filter-chips" id="fc-tags">';
        tags.forEach(function(t){ html += '<button type="button" class="filter-chip" data-tag="'+esc(t)+'">'+esc(t)+'</button>'; });
        html += '</div></div>';
      }
      // Source (From Collection / From Script) — collection takes precedence.
      // Only offer the chips whose source actually appears in the current list.
      var srcSet = {};
      list.forEach(function(c){ var s = sourceOf(c); if (s) srcSet[s] = 1; });
      var srcPresent = SOURCE_LABELS.filter(function(s){ return srcSet[s[0]]; });
      if (srcPresent.length){
        html += '<div class="filter-group"><span class="filter-group-label">Source</span><div class="filter-chips" id="fc-sources">';
        srcPresent.forEach(function(s){ html += '<button type="button" class="filter-chip" data-source="'+esc(s[0])+'">'+esc(s[1])+'</button>'; });
        html += '</div></div>';
      }
      // Creator
      if (creators.length > 1){
        html += '<div class="filter-group"><span class="filter-group-label">Creator</span><select class="filter-select" id="fc-creator"><option value="">All creators</option>';
        creators.forEach(function(c){ html += '<option value="'+esc(c)+'">'+esc(c)+'</option>'; });
        html += '</select></div>';
      }
      // Sort
      html += '<div class="filter-group"><span class="filter-group-label">Sort</span><select class="filter-select" id="fc-sort">' +
        '<option value="name-asc">Name (A–Z)</option>' +
        '<option value="name-desc">Name (Z–A)</option>' +
        '<option value="recent">Recently added</option>' +
        '</select></div>';
      // Reset
      html += '<div class="filter-group"><span class="filter-group-label">&nbsp;</span><button type="button" class="filter-reset" id="fc-reset">Reset filters</button></div>';

      bar.innerHTML = html;
      bar.hidden = false;

      // Mobile: the bar starts collapsed behind a "Filters" toggle (CSS hides
      // the bar below 640px unless .open is set; the button is display:none
      // on desktop, so this changes nothing there).
      var toggle = document.getElementById('filter-toggle');
      if (toggle) {
        toggle.hidden = false;
        toggle.addEventListener('click', function(){
          var open = bar.classList.toggle('open');
          toggle.classList.toggle('open', open);
          toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }

      // Wire events
      bar.querySelectorAll('[data-team]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var v = btn.getAttribute('data-team');
          var ii = STATE.includeTeams.indexOf(v);
          var ei = STATE.excludeTeams.indexOf(v);
          if (ii === -1 && ei === -1) {
            STATE.includeTeams.push(v);
            btn.classList.add('active');
            btn.classList.remove('active-exclude');
          } else if (ii !== -1) {
            STATE.includeTeams.splice(ii, 1);
            STATE.excludeTeams.push(v);
            btn.classList.remove('active');
            btn.classList.add('active-exclude');
          } else {
            STATE.excludeTeams.splice(ei, 1);
            btn.classList.remove('active-exclude');
          }
          render();
        });
      });
      bar.querySelectorAll('[data-tag]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var v = btn.getAttribute('data-tag');
          var ii = STATE.includeTags.indexOf(v);
          var ei = STATE.excludeTags.indexOf(v);
          if (ii === -1 && ei === -1) {
            // unset → include
            STATE.includeTags.push(v);
            btn.classList.add('active');
            btn.classList.remove('active-exclude');
          } else if (ii !== -1) {
            // include → exclude
            STATE.includeTags.splice(ii, 1);
            STATE.excludeTags.push(v);
            btn.classList.remove('active');
            btn.classList.add('active-exclude');
          } else {
            // exclude → unset
            STATE.excludeTags.splice(ei, 1);
            btn.classList.remove('active-exclude');
          }
          render();
        });
      });
      bar.querySelectorAll('[data-source]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var v = btn.getAttribute('data-source');
          var ii = STATE.includeSources.indexOf(v);
          var ei = STATE.excludeSources.indexOf(v);
          if (ii === -1 && ei === -1) {          // unset → include
            STATE.includeSources.push(v);
            btn.classList.add('active');
            btn.classList.remove('active-exclude');
          } else if (ii !== -1) {                // include → exclude
            STATE.includeSources.splice(ii, 1);
            STATE.excludeSources.push(v);
            btn.classList.remove('active');
            btn.classList.add('active-exclude');
          } else {                               // exclude → unset
            STATE.excludeSources.splice(ei, 1);
            btn.classList.remove('active-exclude');
          }
          render();
        });
      });
      var crSel = document.getElementById('fc-creator');
      if (crSel) crSel.addEventListener('change', function(){ STATE.creator = crSel.value; render(); });
      document.getElementById('fc-sort').addEventListener('change', function(e){ STATE.sort = e.target.value; render(); });
      document.getElementById('fc-reset').addEventListener('click', function(){
        STATE = { includeTeams: [], excludeTeams: [], includeTags: [], excludeTags: [], includeSources: [], excludeSources: [], creator: '', sort: 'name-asc' };
        bar.querySelectorAll('.filter-chip').forEach(function(b){ b.classList.remove('active','active-exclude'); });
        if (crSel) crSel.value = '';
        document.getElementById('fc-sort').value = 'name-asc';
        render();
      });
    }

    function applyFilters(){
      var out = FULL.slice();
      if (STATE.includeTeams.length) out = out.filter(function(c){ return STATE.includeTeams.indexOf(c.team) !== -1; });
      if (STATE.excludeTeams.length) out = out.filter(function(c){ return STATE.excludeTeams.indexOf(c.team) === -1; });
      if (STATE.includeTags.length) out = out.filter(function(c){
        var ct = splitTags(c).map(titleCase);
        return STATE.includeTags.every(function(t){ return ct.indexOf(t) !== -1; });
      });
      if (STATE.excludeTags.length) out = out.filter(function(c){
        var ct = splitTags(c).map(titleCase);
        return STATE.excludeTags.every(function(t){ return ct.indexOf(t) === -1; });
      });
      if (STATE.includeSources.length) out = out.filter(function(c){ return STATE.includeSources.indexOf(sourceOf(c)) !== -1; });
      if (STATE.excludeSources.length) out = out.filter(function(c){ return STATE.excludeSources.indexOf(sourceOf(c)) === -1; });
      if (STATE.creator) out = out.filter(function(c){ return (c.creator||'').trim() === STATE.creator; });
      // sort
      if (STATE.sort === 'name-asc') out.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
      else if (STATE.sort === 'name-desc') out.sort(function(a,b){ return (b.name||'').localeCompare(a.name||''); });
      else if (STATE.sort === 'recent') { /* keep array order reversed = most-recent first */
        out = out.map(function(c,i){ return [c, FULL.indexOf(c)]; })
                 .sort(function(a,b){ return b[1]-a[1]; })
                 .map(function(p){ return p[0]; });
      }
      return out;
    }

    function render(){
      var list = applyFilters();
      var panel = document.getElementById('panel');
      var count = document.getElementById('filter-count');
      var toggle = document.getElementById('filter-toggle');
      if (toggle) {
        var nActive = STATE.includeTeams.length + STATE.excludeTeams.length +
          STATE.includeTags.length + STATE.excludeTags.length +
          STATE.includeSources.length + STATE.excludeSources.length + (STATE.creator ? 1 : 0);
        toggle.innerHTML = 'Filters' + (nActive ? ' (' + nActive + ')' : '') +
          ' <span class="filter-toggle-arrow">&#9662;</span>';
      }
      count.hidden = false;
      count.textContent = list.length + ' character' + (list.length===1?'':'s') +
        (FULL.length !== list.length ? ' (of ' + FULL.length + ')' : '');

      if (!list.length){
        panel.innerHTML = '<p style="text-align:center;color:rgba(236,225,200,.6);padding:40px">No characters match these filters. <button type="button" class="filter-reset" onclick="document.getElementById(\'fc-reset\').click()">Reset</button></p>';
        return;
      }
      var html = '';
      // Always group by team; applyFilters() already ordered each group.
      TEAMS.forEach(function (t) {
          var key = t[0], label = t[1];
          var chars = list.filter(function (c) { return c.team === key; });
          if (!chars.length) return;
          html += '<section class="type-section" id="' + key + '">' +
            '<h2 class="type-header"><a href="team?t=' + key + '" class="team-header-link">' + label + '</a></h2><div class="type-rule"></div>' +
            '<div class="char-grid">' + chars.map(card).join('') + '</div></section>';
      });
      panel.innerHTML = html;
    }

    Promise.all([
      fetch('collections.json?_=' + Date.now()).then(function(r){return r.json();}).catch(function(){return[];}),
      fetch('characters.json?_=' + Date.now()).then(function(r){return r.json();}),
      fetch('scripts.json?_=' + Date.now()).then(function(r){return r.json();}).catch(function(){return[];})
    ]).then(function(res){
      var collData = res[0]||[], list = res[1], scripts = res[2]||[];
      (scripts||[]).forEach(function(s){ (s.characters||[]).forEach(function(sl){ SCRIPT_SLUGS[norm(sl)] = true; }); });
      AC_COLLECTIONS = collData.map(function(c){
        return {id:c.id,slug:c.slug,displayName:c.displayName||c.slug,
                match:c.match||[],description:c.description||'',header:c.header||'',
                tagline:c.tagline||'',include:c.include||[],exclude:c.exclude||[]};
      });
      AC_COLLECTIONS.push({id:'standalone',slug:'Standalone',displayName:'Standalone Characters',
                           match:[],standalone:true,description:'',header:''});
                var activeCollection = findCollection(COLLECTION_PARAM);
        // The per-collection browse/filter view now lives on the collection
        // page itself, so send real collections there. (Standalone stays here.)
        if (activeCollection && activeCollection.id && !activeCollection.standalone) {
          location.replace('collection/' + encodeURIComponent(activeCollection.id));
          return;
        }
        if (activeCollection) {
          list = list.filter(function (c) { return charMatchesCollection(c, activeCollection); });
          var displayName = activeCollection.displayName;
          var t = document.getElementById('hero-title');
          var st = document.getElementById('hero-subtitle');
          var cr = document.getElementById('crumb-here');
          if (t) t.textContent = displayName;
          if (st) st.textContent = list.length + ' character' + (list.length === 1 ? '' : 's') + ' in this collection';
          if (cr) cr.textContent = displayName;
          document.title = displayName + ' — BOTC HomeBrew Wiki';
          // Build a dedicated, centered collection hero block
          var hero = document.querySelector('.home-hero');
          if (hero) {
            var heroTitle = document.getElementById('hero-title');
            var heroSub = document.getElementById('hero-subtitle');
            if (heroSub) heroSub.style.display = 'none';
            var stack = document.createElement('div');
            stack.className = 'collection-hero';
            var inner = '';
            if (activeCollection.header) {
              inner += '<div class="collection-hero-header"><img loading="lazy" decoding="async" class="collection-hero-img" src="assets/' + activeCollection.header + '" alt="' + esc(displayName) + '"></div>';
            }
            if (activeCollection.tagline) {
              inner += '<p class="collection-hero-tagline">' + esc(activeCollection.tagline) + '</p>';
            }
            if (activeCollection.description) {
              inner += '<p class="collection-hero-desc">' + esc(activeCollection.description) + '</p>';
            }
            inner += '<p class="collection-hero-count">' + list.length + ' character' + (list.length === 1 ? '' : 's') + ' in this collection</p>';
            if (activeCollection.id && !activeCollection.standalone) {
              inner += '<a class="cta-secondary" style="margin-top:6px" href="collection/' + encodeURIComponent(activeCollection.id) + '">📖 View collection page</a>';
            }
            inner += '<a class="cta-secondary" style="margin-top:6px" href="tokens?collection=' + encodeURIComponent(activeCollection.slug) + '">Print Tokens</a>';
            if (activeCollection.id && !activeCollection.standalone) {
              inner += '<a class="cta-secondary collection-edit-btn" href="publish-collection?c=' + encodeURIComponent(activeCollection.id) + '">✎ Edit Collection</a>';
            }
            // Full collection JSON (official script-tool schema, every character)
            var collJsonText = '';
            if (window.buildSchema && list.length) {
              var meta = { id: '_meta', name: displayName };
              var teamOrder = {}; TEAMS.forEach(function (t, i) { teamOrder[t[0]] = i; });
              var ordered = list.slice().sort(function (a, b) {
                var ta = teamOrder[a.team] != null ? teamOrder[a.team] : 99;
                var tb = teamOrder[b.team] != null ? teamOrder[b.team] : 99;
                return ta !== tb ? ta - tb : (a.name || '').localeCompare(b.name || '');
              });
              collJsonText = JSON.stringify([meta].concat(ordered.map(window.buildSchema)), null, 2);
              inner += '<div class="collection-json">' +
                '<div class="json-box">' +
                  '<div class="json-bar">' +
                    '<span class="json-bar-toggle" role="button" tabindex="0" aria-expanded="false">Collection JSON (all ' + list.length + ' characters) <span class="json-arrow">&#9662;</span></span>' +
                    '<button type="button" class="json-copy">Copy JSON</button>' +
                  '</div>' +
                  '<pre class="json-body" hidden><code>' + esc(collJsonText) + '</code></pre>' +
                '</div>' +
                '<a class="cta-secondary" style="display:inline-block;margin-top:10px" href="#" id="coll-json-download">⬇ Download JSON</a>' +
              '</div>';
            }
            stack.innerHTML = inner;
            var cdl = stack.querySelector('#coll-json-download');
            if (cdl) cdl.addEventListener('click', function (e) {
              e.preventDefault();
              var blob = new Blob([collJsonText], { type: 'application/json' });
              var u = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = u;
              a.download = (activeCollection.id || norm(displayName) || 'collection') + '.json';
              document.body.appendChild(a); a.click(); document.body.removeChild(a);
              setTimeout(function () { URL.revokeObjectURL(u); }, 1000);
            });
            // place the stack right after the title
            if (heroTitle && heroTitle.nextSibling) hero.insertBefore(stack, heroTitle.nextSibling);
            else hero.appendChild(stack);
            // we replaced the subtitle's character-count text, so clear it
            if (heroSub) heroSub.textContent = '';
          }
        }
        FULL = list;
        buildFilterBar(list);
        render();
      })
      .catch(function () {
        document.getElementById('panel').innerHTML =
          '<p style="text-align:center;color:#e6a;padding:30px">Could not load character list.</p>';
      });
  </script>

  <script src="assets/site.js"></script>
</body>
</html>
