<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — BOTC HomeBrew Wiki</title>
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-skull" src="assets/logo_skull.png" alt="">
      <img class="brand-header-text" src="assets/headertext.png" alt="BOTC HomeBrew Wiki">
      <img class="topbar-badge" src="assets/ccc-parchment.png" alt="Community Created Content">
    </a>
    <nav class="crumb" aria-label="Breadcrumb" id="crumb">
      <a href="index.html">Characters</a>
    </nav>
  <div class="search-wrap" id="search-wrap">
    <input class="search-input" id="search-input" type="search" placeholder="Search characters…" autocomplete="off" aria-label="Search characters" aria-expanded="false" aria-haspopup="listbox">
    <div class="search-drop" id="search-drop" role="listbox" aria-label="Search results" hidden></div>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Navigation menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>
<nav class="nav-dropdown" id="nav-dropdown" aria-label="Mobile navigation">
  <div class="nav-dropdown-search">
    <input type="search" id="nav-search-input" placeholder="Search characters…" autocomplete="off">
  </div>
  <a href="index.html">All Characters</a>
  <a href="tags.html">Tags</a>
  <a href="creators.html">Creators</a>
  <a href="script.html">Script Builder</a>
  <a href="create.html">Create a Character</a>
</nav>

  <div class="home-hero" id="hero">
    <h1 id="hero-title">Loading&hellip;</h1>
    <p>Fan-made additions for Blood on the Clocktower</p>
  </div>

  <main class="home-panel" id="panel">
    <p style="text-align:center;color:rgba(236,225,200,.7);padding:30px">Loading characters&hellip;</p>
  </main>

  <p class="foot">Fan-made content for <em>Blood on the Clocktower</em> &middot; Not affiliated with The Pandemonium Institute</p>

  <script>
    var GOOD = { townsfolk: 1, outsider: 1 };
    var TEAM_LABEL = {
      townsfolk: 'Townsfolk', outsider: 'Outsider', minion: 'Minion',
      demon: 'Demon', traveller: 'Traveller', fabled: 'Fabled'
    };

    var team  = new URLSearchParams(location.search).get('t') || '';
    var label = TEAM_LABEL[team] || team;

    document.title = label + ' — BOTC HomeBrew Wiki';
    document.getElementById('hero-title').textContent = label;
    document.getElementById('crumb').innerHTML =
      '<a href="index.html">Characters</a><span class="sep">›</span>' +
      '<span class="here">' + label + '</span>';

    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;')
        .replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function card(c) {
      var typeClass = GOOD[c.team] ? ' good' : '';
      return '<a class="char-card" href="' + esc(c.page) + '">' +
        '<img class="char-card-thumb" src="assets/' + esc(c.art) + '" alt="' + esc(c.name) + ' art">' +
        '<div class="char-card-info">' +
        '<div class="char-card-name">' + esc(c.name) + '</div>' +
        '<div class="char-card-type' + typeClass + '">' + esc(TEAM_LABEL[c.team] || c.team) + '</div>' +
        '<div class="char-card-ability">' + esc(c.ability || '') + '</div>' +
        '<span class="char-card-link">View Character →</span>' +
        '</div></a>';
    }

    fetch('characters.json?_=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(list) {
        var panel = document.getElementById('panel');
        if (!team || !TEAM_LABEL[team]) {
          panel.innerHTML = '<p style="text-align:center;color:rgba(236,225,200,.7);padding:30px">Unknown team. <a href="index.html" style="color:#7fb2e6">Back to all characters</a>.</p>';
          return;
        }
        var chars = list.filter(function(c) { return c.team === team; });
        if (!chars.length) {
          panel.innerHTML = '<p style="text-align:center;color:rgba(236,225,200,.7);padding:30px">No ' + esc(label) + ' characters yet. <a href="create.html" style="color:#7fb2e6">Create one!</a></p>';
          return;
        }
        panel.innerHTML =
          '<div class="type-section">' +
          '<div class="char-grid">' +
          chars.map(card).join('') +
          '<a class="char-card empty-card" href="create.html" style="display:flex;align-items:center;justify-content:center;text-decoration:none">+ Add a ' + esc(label) + '</a>' +
          '</div></div>';
      })
      .catch(function() {
        document.getElementById('panel').innerHTML =
          '<p style="text-align:center;color:#e6a;padding:30px">Could not load character list.</p>';
      });
  </script>
<script>
  (function () {
    // asset prefix differs for pages in characters/ subfolder
    var ROOT = (function () {
      var s = document.querySelector('link[rel="stylesheet"]');
      if (!s) return '';
      var href = s.getAttribute('href');
      return href.replace('assets/styles.css', '');
    })();

    var input = document.getElementById('search-input');
    var drop  = document.getElementById('search-drop');
    if (!input || !drop) return;

    var allChars = null;
    var fetchPromise = null;

    function ensureData() {
      if (allChars) return Promise.resolve(allChars);
      if (fetchPromise) return fetchPromise;
      fetchPromise = fetch(ROOT + 'characters.json?_=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (list) { allChars = list; return list; });
      return fetchPromise;
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var GOOD = { townsfolk: 1, outsider: 1 };
    var TEAM_LABEL = {
      townsfolk:'Townsfolk', outsider:'Outsider', minion:'Minion',
      demon:'Demon', traveller:'Traveller', fabled:'Fabled'
    };

    function search(q) {
      q = q.trim().toLowerCase();
      if (!q || !allChars) return [];
      return allChars.filter(function (c) {
        var haystack = [
          c.name || '',
          c.ability || '',
          c.tags || '',
          c.lede || '',
          c.team || ''
        ].join(' ').toLowerCase();
        return haystack.indexOf(q) !== -1;
      }).slice(0, 8);
    }

    function render(results, q) {
      if (!results.length) {
        drop.innerHTML = '<div class="search-empty">No characters found for \u201c' + esc(q) + '\u201d</div>';
        return;
      }
      drop.innerHTML = results.map(function (c) {
        var typeClass = GOOD[c.team] ? ' good' : '';
        var ability = c.ability || '';
        if (ability.length > 80) ability = ability.slice(0, 80) + '…';
        return '<a class="search-result" href="' + esc(ROOT + c.page) + '" role="option">' +
          '<img class="search-result-thumb" src="' + esc(ROOT + 'assets/' + c.art) + '" alt="">' +
          '<div class="search-result-info">' +
          '<span class="search-result-name">' + esc(c.name) + '</span>' +
          '<span class="search-result-type' + typeClass + '">' + esc(TEAM_LABEL[c.team] || c.team) + '</span>' +
          '<span class="search-result-ability">' + esc(ability) + '</span>' +
          '</div></a>';
      }).join('');
    }

    function open() {
      drop.hidden = false;
      input.setAttribute('aria-expanded', 'true');
    }
    function close() {
      drop.hidden = true;
      input.setAttribute('aria-expanded', 'false');
    }

    var debTimer;
    input.addEventListener('input', function () {
      clearTimeout(debTimer);
      var q = input.value.trim();
      if (!q) { close(); return; }
      debTimer = setTimeout(function () {
        ensureData().then(function () {
          var results = search(q);
          render(results, q);
          open();
        });
      }, 150);
    });

    input.addEventListener('focus', function () {
      if (input.value.trim() && allChars) open();
    });

    // Keyboard navigation
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { close(); input.blur(); return; }
      if (e.key === 'ArrowDown') {
        var first = drop.querySelector('.search-result');
        if (first) { e.preventDefault(); first.focus(); }
        return;
      }
    });
    drop.addEventListener('keydown', function (e) {
      var cur = document.activeElement;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        var next = cur.nextElementSibling;
        if (next) next.focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        var prev = cur.previousElementSibling;
        if (prev) prev.focus(); else input.focus();
      } else if (e.key === 'Escape') {
        close(); input.focus();
      }
    });

    // Close on outside click
    document.addEventListener('click', function (e) {
      if (!document.getElementById('search-wrap').contains(e.target)) close();
    });

    // Prefetch on hover so results feel instant
    document.getElementById('search-wrap').addEventListener('mouseenter', ensureData);
  })();
</script>


  <script>
  (function(){
    var btn = document.getElementById('hamburger');
    var drop = document.getElementById('nav-dropdown');
    if (!btn || !drop) return;
    // Mark current page as active
    var here = location.pathname.split('/').pop() || 'index.html';
    drop.querySelectorAll('a').forEach(function(a){
      if (a.getAttribute('href') === here) a.classList.add('active');
    });
    function positionDrop(){
      var tb = document.querySelector('.topbar');
      if (tb) drop.style.top = tb.getBoundingClientRect().height + 'px';
    }
    btn.addEventListener('click', function(){
      positionDrop();
      var open = drop.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      if (open) { var ns = document.getElementById('nav-search-input'); if (ns) setTimeout(function(){ ns.focus(); }, 80); }
    });
    // nav search mirrors topbar search
    var navSearch = document.getElementById('nav-search-input');
    var topSearch = document.getElementById('search-input');
    if (navSearch) {
      navSearch.addEventListener('input', function(){
        if (topSearch) { topSearch.value = navSearch.value; topSearch.dispatchEvent(new Event('input')); }
      });
      navSearch.addEventListener('keydown', function(e){
        if (e.key === 'Escape') { drop.classList.remove('open'); btn.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
      });
    }
    window.addEventListener('resize', positionDrop);
    document.addEventListener('click', function(e){
      if (!btn.contains(e.target) && !drop.contains(e.target)){
        drop.classList.remove('open');
        btn.classList.remove('open');
        btn.setAttribute('aria-expanded','false');
      }
    });
  })();
  </script>
</body>
</html>
